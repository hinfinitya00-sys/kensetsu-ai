<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <script src="js/auth.js"></script>
  <script>KS_AUTH.checkAuth();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建設AI｜写真台帳</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/photo-ledger.css">

  <!-- CDN Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      background:var(--black); color:var(--text);
      font-family:'Noto Sans JP',sans-serif; min-height:100vh; overflow-x:hidden;
    }
    a { color:inherit; text-decoration:none; }
    button { font-family:'Noto Sans JP',sans-serif; cursor:pointer; }
    input, select, textarea { font-family:'Noto Sans JP',sans-serif; }

    header {
      background:var(--dark); border-bottom:2px solid var(--orange);
      padding:0 24px; height:60px;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100;
    }
    .logo {
      display:flex; align-items:center; gap:10px;
      font-family:'Oswald',sans-serif; font-size:20px; font-weight:700;
      letter-spacing:1px; color:var(--text);
    }
    .logo-mark {
      width:32px; height:32px; background:var(--orange);
      clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      display:flex; align-items:center; justify-content:center;
      font-size:14px; font-weight:900; color:white;
    }
    .header-right { display:flex; align-items:center; gap:12px; }
    .icon-btn {
      background:rgba(255,255,255,.08); border:1px solid var(--border);
      color:var(--muted); width:36px; height:36px; border-radius:8px; font-size:18px;
      display:flex; align-items:center; justify-content:center; transition:all .2s;
    }
    .icon-btn:hover { background:rgba(255,107,0,.15); border-color:var(--orange); color:var(--orange); }

    .container { max-width:1100px; margin:0 auto; padding:24px 24px 60px; }

    .page-header { margin-bottom:24px; }
    .page-title {
      font-family:'Oswald',sans-serif; font-size:26px; font-weight:700;
      letter-spacing:1px; margin-bottom:4px;
    }
    .page-title span { color:var(--orange); }
    .page-sub { font-size:13px; color:var(--muted); }

    .card {
      background:var(--card); border:1px solid var(--border);
      border-radius:12px; margin-bottom:20px; overflow:hidden;
    }
    .card-header {
      padding:14px 20px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:8px;
      font-size:14px; font-weight:700;
    }
    .card-header .dot { width:8px; height:8px; background:var(--orange); border-radius:50%; flex-shrink:0; }
    .card-body { padding:20px; }

    .form-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
    .f-group { display:flex; flex-direction:column; gap:5px; }
    .f-group label {
      font-size:11px; font-weight:700; color:var(--muted);
      text-transform:uppercase; letter-spacing:.5px;
    }
    .f-input {
      background:var(--card2); border:1px solid var(--border);
      color:var(--text); padding:10px 12px; border-radius:8px;
      font-size:14px; transition:border-color .2s; width:100%;
    }
    .f-input:focus { outline:none; border-color:var(--orange); }
    .f-input::placeholder { color:var(--muted); opacity:.6; }

    .btn-primary {
      background:linear-gradient(135deg,var(--orange),var(--orange-dark));
      color:#fff; border:none; padding:12px 28px; border-radius:10px;
      font-size:15px; font-weight:700; display:flex; align-items:center; gap:8px;
      box-shadow:0 4px 14px rgba(255,107,0,.35); transition:all .2s;
    }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(255,107,0,.45); }
    .btn-secondary {
      background:var(--card2); color:var(--text); border:1px solid var(--border);
      padding:10px 16px; border-radius:10px; font-size:14px; font-weight:700;
      display:flex; align-items:center; gap:8px; transition:all .2s;
    }
    .btn-secondary:hover { border-color:var(--orange); color:var(--orange); }

    .toast {
      position:fixed; bottom:24px; left:50%;
      transform:translateX(-50%) translateY(80px);
      padding:10px 22px; border-radius:100px; font-size:13px; font-weight:600;
      color:#fff; background:var(--dark); z-index:400;
      transition:transform .3s cubic-bezier(.34,1.56,.64,1);
      white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,.4);
    }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .toast.ok  { background:var(--green); }
    .toast.err { background:var(--red); }

    .api-key-section {
      display:flex; gap:10px; align-items:flex-end; margin-top:12px;
    }
    .api-key-section .f-group { flex:1; }

    .section-header {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:16px;
    }

    @media(max-width:640px){
      .form-grid { grid-template-columns:1fr; }
      .api-key-section { flex-direction:column; }
    }
  </style>
  <style id="print-styles">
    @media print {
      header, .card:has(.upload-zone), .card:has(.form-grid),
      .export-buttons, .card-actions, .toast, .btn-secondary,
      .select-overlay, #selectModeBtn, #bulkDeleteBtn,
      [onclick*="promptLoadFromDB"], [onclick*="restoreFromStorage"],
      .page-header, .page-sub, .empty-state,
      .card:has(.api-key-section), .card:has(.category-tabs) { display: none !important; }

      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { background: #fff !important; color: #000 !important; margin: 0; padding: 0; }

      #print-cover {
        display: block !important;
        page-break-after: always;
        padding: 40px;
        text-align: center;
        font-family: "Noto Sans JP", sans-serif;
      }

      #print-page-header {
        display: block !important;
        font-size: 9pt;
        color: #666;
        border-bottom: 1px solid #ccc;
        padding-bottom: 3px;
        margin-bottom: 6px;
      }

      .container { padding: 0 10px !important; max-width: none !important; }
      .card { background: #fff !important; border: none !important; box-shadow: none !important; margin: 0 !important; }
      .card-header { display: none !important; }
      .card-body { padding: 0 !important; }

      #photoGrid {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
        gap: 6px !important;
        padding: 0 !important;
        background: #fff !important;
      }

      .photo-card {
        display: block !important;
        background: #fff !important;
        border: 1px solid #999 !important;
        break-inside: avoid !important;
        page-break-inside: avoid !important;
        margin: 0 !important;
        padding: 4px !important;
        box-shadow: none !important;
        border-radius: 2px !important;
      }
      .photo-card .card-img-wrap { aspect-ratio: auto !important; }
      .photo-card .card-img-wrap img {
        width: 100% !important;
        height: 140px !important;
        object-fit: cover !important;
        display: block !important;
      }
      .photo-card .card-body { padding: 3px 4px !important; }
      .photo-card .card-category { font-size: 9pt !important; color: #333 !important; font-weight: bold !important; margin: 2px 0 !important; }
      .photo-card .card-desc { font-size: 8pt !important; color: #444 !important; margin: 1px 0 !important; }
      .photo-card .card-meta { font-size: 8pt !important; color: #666 !important; border-top-color: #ccc !important; padding: 3px 4px !important; }
      .photo-card .progress-overlay { display: none !important; }

      @page { size: A4 portrait; margin: 12mm; }
    }

    #print-cover, #print-page-header { display: none; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-mark">建</div>
    <span>KENSETSU<span style="color:var(--orange)">AI</span></span>
  </div>
  <div class="header-right">
    <a href="admin.html" class="icon-btn" title="ダッシュボードへ戻る">🏠</a>
  </div>
</header>

<div class="container">

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-title">📸 写真台帳 <span>AI自動分類</span></div>
    <div class="page-sub">法面工事写真をアップロードすると、AIが自動で分類・説明を生成します</div>
  </div>

  <!-- 工事基本情報 -->
  <div class="card">
    <div class="card-header"><div class="dot"></div>工事基本情報</div>
    <div class="card-body">
      <div class="form-grid">
        <div class="f-group">
          <label>工事名称</label>
          <input type="text" id="projectName" class="f-input" placeholder="○○法面崩壊防止工事">
        </div>
        <div class="f-group">
          <label>施工業者</label>
          <input type="text" id="contractorName" class="f-input" placeholder="○○建設株式会社">
        </div>
        <div class="f-group">
          <label>現場所在地</label>
          <input type="text" id="siteLocation" class="f-input" placeholder="福岡県○○市○○地内">
        </div>
        <div class="f-group">
          <label>工事番号</label>
          <input type="text" id="projectNumber" class="f-input" placeholder="R6-○○-001">
        </div>
        <div class="f-group">
          <label>発注者名</label>
          <input type="text" id="clientName" class="f-input" placeholder="○○県○○土木事務所">
        </div>
        <div class="f-group">
          <label>工期（着手）</label>
          <input type="date" id="startDate" class="f-input">
        </div>
        <div class="f-group">
          <label>工期（完成）</label>
          <input type="date" id="endDate" class="f-input">
        </div>
        <div class="f-group">
          <label>現場代理人</label>
          <input type="text" id="siteManager" class="f-input" placeholder="氏名">
        </div>
        <div class="f-group">
          <label>監理技術者</label>
          <input type="text" id="supervisor" class="f-input" placeholder="氏名">
        </div>
      </div>
      <div class="api-key-section">
        <div class="f-group">
          <label>Claude API Key（AI自動分類用・任意）</label>
          <input type="password" id="apiKeyInput" class="f-input" placeholder="sk-ant-...">
        </div>
      </div>
    </div>
  </div>

  <!-- 過去台帳読み込み -->
  <div style="margin-bottom:20px;display:flex;gap:10px;">
    <button class="btn-secondary" onclick="LEDGER.promptLoadFromDB()" style="flex:1;justify-content:center;">
      📂 保存済み台帳を読み込む
    </button>
    <button class="btn-secondary" onclick="LEDGER.restoreFromStorage()" style="flex:1;justify-content:center;">
      🔄 Storageから写真を復元
    </button>
  </div>

  <!-- 電子小黒板テンプレート -->
  <div class="card">
    <div class="card-header"><div class="dot"></div>📋 電子小黒板テンプレート設定</div>
    <div class="card-body">
      <div class="form-grid">
        <div class="f-group">
          <label>工種プリセット</label>
          <select id="presetWorkType" class="f-input">
            <option value="">（選択なし）</option>
            <option value="植生工">植生工</option>
            <option value="吹付工">吹付工</option>
            <option value="法枠工">法枠工</option>
            <option value="アンカー工">アンカー工</option>
            <option value="法面清掃工">法面清掃工</option>
            <option value="仮設工">仮設工</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="f-group">
          <label>測点の初期値</label>
          <input type="text" id="presetMeasurement" class="f-input" placeholder="例: No.10+5.0">
        </div>
        <div class="f-group">
          <label>撮影者の初期値</label>
          <input type="text" id="presetPhotographer" class="f-input" placeholder="氏名">
        </div>
      </div>
      <div style="margin-top:10px;font-size:12px;color:var(--muted);">
        ※ ここで設定した値は、次にアップロードする写真のデフォルト値になります
      </div>
    </div>
  </div>

  <!-- アップロードゾーン -->
  <div class="card">
    <div class="card-header"><div class="dot"></div>写真アップロード</div>
    <div class="card-body">
      <div class="upload-zone" id="uploadZone">
        <span class="upload-icon">📸</span>
        <div class="upload-title">写真をドラッグ&ドロップ または クリックして選択</div>
        <div class="upload-sub">JPEG / PNG 対応・複数ファイル一括アップロード可能</div>
        <input type="file" id="fileInput" multiple accept="image/*">
      </div>
    </div>
  </div>

  <!-- 印刷用表紙 -->
  <div id="print-cover">
    <h1 style="font-size:28pt;font-weight:bold;margin-bottom:20px;">工事写真台帳</h1>
    <hr style="border:2px solid #333;margin:20px 0;">
    <table style="width:100%;font-size:13pt;line-height:2.2;text-align:left;border-collapse:collapse;">
      <tr><td style="width:140px;font-weight:bold;">工事名称</td><td id="pc-name">—</td></tr>
      <tr><td style="font-weight:bold;">施工業者</td><td id="pc-contractor">—</td></tr>
      <tr><td style="font-weight:bold;">発注者名</td><td id="pc-client">—</td></tr>
      <tr><td style="font-weight:bold;">現場所在地</td><td id="pc-location">—</td></tr>
      <tr><td style="font-weight:bold;">工期</td><td id="pc-period">—</td></tr>
      <tr><td style="font-weight:bold;">作成日</td><td id="pc-date">—</td></tr>
    </table>
    <hr style="border:2px solid #333;margin:20px 0;">
  </div>

  <!-- 写真グリッド -->
  <div class="card">
    <div class="card-header">
      <div class="dot"></div>
      写真一覧
      <div class="photo-count" style="margin-left:auto;">
        <span id="photoCount">0枚</span>
      </div>
    </div>
    <div class="card-body">

      <!-- カテゴリタブ -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <div class="category-tabs" id="categoryTabs" style="flex:1;margin-bottom:0;"></div>
        <button id="selectModeBtn" onclick="LEDGER.toggleSelectMode()">☑️ 選択モード</button>
        <button id="bulkDeleteBtn" onclick="LEDGER.bulkDelete()" style="display:none">🗑️ 選択削除（0枚）</button>
      </div>

      <!-- 写真グリッド -->
      <div id="print-page-header"><span id="print-header-project"></span>　工事写真台帳</div>

      <div class="photo-grid" id="photoGrid">
        <div class="empty-state" style="grid-column:1/-1;">
          <span class="empty-icon">📷</span>
          <div class="empty-title">写真がありません</div>
          <div class="empty-sub">上のエリアから写真をアップロードしてください</div>
        </div>
      </div>

    </div>
  </div>

  <!-- 出力ボタン -->
  <div class="export-buttons">
    <button class="btn-secondary" onclick="LEDGER.saveToSupabase()">💾 保存・更新</button>
    <button class="btn-export btn-excel" onclick="LEDGER.handleExportExcel()">📊 Excel出力</button>
    <button class="btn-export btn-pdf" onclick="LEDGER.handleExportPDF()">📄 PDF出力</button>
    <button class="btn-export btn-pdf" onclick="LEDGER.handlePrint()">🖨️ 印刷</button>
    <button class="btn-export" onclick="LEDGER.checkElectronicSubmission()" style="background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;box-shadow:0 4px 14px rgba(124,58,237,.35);">📦 電子納品ZIP</button>
    <button class="btn-export" onclick="LEDGER.shareLink()" style="background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;box-shadow:0 4px 14px rgba(59,130,246,.35);">🔗 共有リンクをコピー</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- JS -->
<script src="js/photo-ai-analyzer.js"></script>
<script src="js/photo-pdf-export.js"></script>
<script src="js/photo-xml-export.js"></script>
<script src="js/photo-ledger.js"></script>
</body>
</html>

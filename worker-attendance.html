<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作業員 日報入力</title>
<style>
  :root {
    --bg: #0d1f15;
    --bg2: #122b1c;
    --bg3: #1a3828;
    --green-light: #22a05a;
    --green-mid: #16803e;
    --green-dim: #0f5c2c;
    --text: #e8f5ee;
    --text-dim: #8ab89a;
    --border: #1e4a2e;
    --accent: #2ecc71;
    --warn: #f59e0b;
    --danger: #ef4444;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    min-height: 100vh;
    padding: 0 0 40px;
  }
  header {
    background: linear-gradient(135deg, #0a1a0f 0%, var(--bg2) 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 20px 16px;
    text-align: center;
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { font-size: 1.2rem; font-weight: 700; color: var(--accent); letter-spacing: 0.05em; }
  header p { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }

  .container { max-width: 500px; margin: 0 auto; padding: 20px 16px; }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-title::before {
    content: '';
    display: inline-block;
    width: 3px; height: 14px;
    background: var(--green-light);
    border-radius: 2px;
  }

  label { display: block; font-size: 0.82rem; color: var(--text-dim); margin-bottom: 5px; }
  label .required { color: var(--danger); margin-left: 3px; }
  label .optional { color: var(--text-dim); font-size: 0.72rem; margin-left: 4px; }

  select, input[type="text"], input[type="date"], input[type="number"], input[type="time"], textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.95rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
    -webkit-appearance: none;
  }
  select:focus, input:focus, textarea:focus { border-color: var(--green-light); }
  select option { background: var(--bg3); }

  .form-row { margin-bottom: 14px; }

  .new-worker-area {
    display: none;
    background: var(--bg3);
    border: 1px solid var(--green-dim);
    border-radius: 8px;
    padding: 14px;
    margin-top: 10px;
  }
  .new-worker-area.open { display: block; }
  .new-worker-area .form-row:last-child { margin-bottom: 0; }

  .rate-preview {
    background: var(--bg3);
    border: 1px solid var(--green-dim);
    border-radius: 8px;
    padding: 12px;
    margin-top: 10px;
    display: none;
  }
  .rate-preview.show { display: block; }
  .rate-preview .base-rate {
    font-size: 1.1rem; font-weight: 700; color: var(--accent);
  }
  .rate-preview .rate-note { font-size: 0.75rem; color: var(--warn); margin-top: 4px; }
  .rate-list { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
  .rate-badge {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px;
    font-size: 0.75rem; color: var(--text-dim);
  }
  .rate-badge.active { border-color: var(--accent); color: var(--accent); background: rgba(46,204,113,0.1); }

  /* ステータス選択 */
  .status-tabs {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px; margin-bottom: 4px;
  }
  .status-tab {
    border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 6px;
    text-align: center; cursor: pointer;
    font-size: 0.82rem; transition: all 0.2s;
    background: var(--bg3);
    color: var(--text-dim);
  }
  .status-tab .icon { font-size: 1.2rem; display: block; margin-bottom: 3px; }
  .status-tab.selected-present { border-color: var(--accent); color: var(--accent); background: rgba(46,204,113,0.1); }
  .status-tab.selected-absent { border-color: var(--danger); color: var(--danger); background: rgba(239,68,68,0.1); }
  .status-tab.selected-late { border-color: var(--warn); color: var(--warn); background: rgba(245,158,11,0.1); }

  /* 条件表示エリア */
  .conditional-area { display: none; margin-top: 12px; }
  .conditional-area.show { display: block; }

  /* 遅刻入力 */
  .late-input-area {
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 8px; padding: 12px;
  }
  .late-input-area label { color: var(--warn); }

  /* 欠勤入力 */
  .absent-input-area {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px; padding: 12px;
  }
  .absent-input-area label { color: #fca5a5; }

  /* メーター写真 */
  .photo-upload-area {
    border: 2px dashed var(--border);
    border-radius: 8px; padding: 16px;
    text-align: center; cursor: pointer;
    transition: border-color 0.2s;
    position: relative;
  }
  .photo-upload-area:hover { border-color: var(--green-light); }
  .photo-upload-area input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .photo-upload-area .upload-icon { font-size: 2rem; margin-bottom: 6px; }
  .photo-upload-area p { font-size: 0.8rem; color: var(--text-dim); }
  .photo-preview {
    margin-top: 10px; display: none;
    position: relative;
  }
  .photo-preview img {
    width: 100%; max-height: 200px; object-fit: cover;
    border-radius: 8px; border: 1px solid var(--border);
  }
  .photo-preview .remove-photo {
    position: absolute; top: 6px; right: 6px;
    background: rgba(0,0,0,0.7); border: none; color: white;
    border-radius: 50%; width: 28px; height: 28px; cursor: pointer;
    font-size: 0.9rem; display: flex; align-items: center; justify-content: center;
  }

  /* ボタン */
  .btn {
    width: 100%; padding: 14px;
    border-radius: var(--radius); border: none;
    font-size: 1rem; font-weight: 700; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--green-light), var(--green-mid));
    color: white;
  }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: var(--bg3); color: var(--text-dim);
    border: 1px solid var(--border); margin-top: 8px;
    font-size: 0.85rem; padding: 10px;
  }

  /* 成功画面 */
  #successScreen {
    display: none;
    text-align: center; padding: 40px 20px;
  }
  #successScreen.show { display: block; }
  .success-icon { font-size: 4rem; margin-bottom: 16px; }
  .success-title { font-size: 1.4rem; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .success-detail {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin: 16px 0;
    text-align: left;
  }
  .success-detail .row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
  .success-detail .row:last-child { border-bottom: none; }
  .success-detail .val { font-weight: 600; color: var(--accent); }
  .success-absent .val { color: var(--danger); }
  .success-late .val { color: var(--warn); }

  /* フォーム */
  #mainForm { display: block; }

  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.6s linear infinite; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    color: var(--danger); font-size: 0.8rem;
    margin-top: 6px; display: none;
  }
  .error-msg.show { display: block; }

  /* 日時表示 */
  .date-display {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px;
    font-size: 0.95rem; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .date-display span { color: var(--text-dim); font-size: 0.8rem; }
</style>
</head>
<body>

<header>
  <h1>🏗️ 建設日報システム</h1>
  <p id="todayHeader"></p>
</header>

<div class="container">
  <!-- メインフォーム -->
  <div id="mainForm">

    <!-- 作業員選択 -->
    <div class="card">
      <div class="card-title">作業員</div>
      <div class="form-row">
        <label>氏名を選択 <span class="required">*</span></label>
        <select id="workerSelect">
          <option value="">-- 読み込み中... --</option>
        </select>
      </div>
      <!-- 新規登録フォーム -->
      <div class="new-worker-area" id="newWorkerArea">
        <div class="form-row">
          <label>氏名 <span class="required">*</span></label>
          <input type="text" id="newName" placeholder="例: 山田 太郎">
        </div>
        <button class="btn btn-secondary" id="registerWorkerBtn" onclick="registerWorker()">＋ 登録する</button>
      </div>
      <!-- 単価プレビュー -->
      <div class="rate-preview" id="ratePreview">
        <div class="base-rate" id="baseRateText"></div>
        <div class="rate-note" id="rateMatchNote"></div>
        <div class="rate-list" id="rateList"></div>
      </div>
    </div>

    <!-- 報告日 -->
    <div class="card">
      <div class="card-title">報告日</div>
      <div class="form-row">
        <div class="date-display" id="workDateDisplay">
          <span>📅</span> <span id="dateText"></span>
        </div>
        <input type="date" id="workDate" style="display:none">
      </div>
      <div style="margin-top:8px">
        <button class="btn btn-secondary" onclick="toggleDateEdit()" id="dateEditBtn" style="font-size:0.75rem; padding:6px">
          📝 日付を変更する
        </button>
      </div>
    </div>

    <!-- 出勤ステータス -->
    <div class="card">
      <div class="card-title">本日の状況</div>
      <div class="status-tabs">
        <div class="status-tab selected-present" id="tab-present" onclick="selectStatus('present')">
          <span class="icon">✅</span>出勤
        </div>
        <div class="status-tab" id="tab-absent" onclick="selectStatus('absent')">
          <span class="icon">🏠</span>欠勤
        </div>
        <div class="status-tab" id="tab-vacation" onclick="selectStatus('vacation')">
          <span class="icon">🌿</span>休暇
        </div>
        <div class="status-tab" id="tab-late" onclick="selectStatus('late')">
          <span class="icon">⏰</span>遅刻
        </div>
      </div>

      <!-- 欠勤の場合 -->
      <div class="conditional-area" id="absentArea">
        <div class="absent-input-area">
          <div class="form-row" style="margin-bottom:0">
            <label>欠勤理由 <span class="optional">(任意)</span></label>
            <select id="absentReason">
              <option value="">-- 選択 --</option>
              <option value="当日欠勤">当日欠勤</option>
              <option value="有給">有給休暇</option>
              <option value="体調不良">体調不良</option>
              <option value="家族の事情">家族の事情</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="form-row" style="margin-top:10px; margin-bottom:0">
            <label>備考 <span class="optional">(任意)</span></label>
            <input type="text" id="absentNote" placeholder="詳細があれば記入">
          </div>
        </div>
      </div>

      <!-- 遅刻の場合 -->
      <div class="conditional-area" id="lateArea">
        <div class="late-input-area">
          <div class="form-row" style="margin-bottom:0">
            <label>出勤時刻 <span class="required">*</span></label>
            <input type="time" id="lateTime" value="09:00">
          </div>
          <div class="form-row" style="margin-top:10px; margin-bottom:0">
            <label>遅刻理由 <span class="optional">(任意)</span></label>
            <input type="text" id="lateReason" placeholder="例: 電車遅延、体調不良など">
          </div>
        </div>
      </div>
    </div>

    <!-- 現場・作業内容（出勤・遅刻の場合のみ） -->
    <div class="card" id="workDetailCard">
      <div class="card-title">現場・作業内容</div>
      <div class="form-row">
        <label>現場会社名（元請会社） <span class="required">*</span></label>
        <input type="text" id="siteCompany" list="companyList" placeholder="例: ○○建設株式会社">
        <datalist id="companyList"></datalist>
      </div>
      <div class="form-row">
        <label>現場名 <span class="required">*</span></label>
        <input type="text" id="siteName" list="siteList" placeholder="現場名を入力または選択">
        <datalist id="siteList"></datalist>
      </div>
      <div class="form-row">
        <label>作業内容 <span class="required">*</span></label>
        <input type="text" id="workContent" placeholder="例: 法面吹付工事、鉄筋組立など" oninput="matchWorkRate()">
      </div>
      <div class="form-row">
        <label>勤務時間 (h)</label>
        <input type="number" id="workHours" value="8.0" min="0.5" max="24" step="0.5">
      </div>
      <div class="form-row">
        <label>日当（円）</label>
        <input type="number" id="dailyRateInput" value="15000" min="0" step="500">
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="btn btn-primary" id="submitBtn" onclick="submitReport()">
      📤 報告を送信する
    </button>
  </div>

  <!-- 成功画面 -->
  <div id="successScreen">
    <div class="success-icon" id="successIcon">✅</div>
    <div class="success-title" id="successTitle">報告を送信しました！</div>
    <p style="color:var(--text-dim); font-size:0.85rem">お疲れ様です</p>
    <div class="success-detail" id="successDetail"></div>
    <button class="btn btn-secondary" onclick="resetForm()">🔄 別の報告を送信</button>
  </div>
</div>

<script>
const SB_URL = 'https://bjohdzcoziezdkqcebhe.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqb2hkemNvemllemRrcWNlYmhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTI5NTAsImV4cCI6MjA4ODg4ODk1MH0.SUZ35eULi_RQzNPDQG2n5cBJCdTDXJZ1pB307ZNbSPU';

const HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Prefer': 'return=minimal'
};

let workers = [];
let selectedWorker = null;
let currentStatus = 'present';
let photoBase64 = null;

// 初期化
window.onload = async () => {
  const today = new Date();
  const ymd = today.toISOString().split('T')[0];
  document.getElementById('workDate').value = ymd;
  document.getElementById('dateText').textContent = formatDateJP(ymd);
  document.getElementById('todayHeader').textContent = formatDateJP(ymd) + ' (' + ['日','月','火','水','木','金','土'][today.getDay()] + ')';
  await loadWorkers();
  await loadSites();
};

function formatDateJP(ymd) {
  const d = new Date(ymd + 'T00:00:00');
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

async function loadWorkers() {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/workers?is_active=eq.true&order=name`, { headers: HEADERS });
    workers = await res.json();
    const sel = document.getElementById('workerSelect');
    sel.innerHTML = '<option value="">-- 作業員を選択 --</option>';
    workers.forEach(w => {
      const opt = document.createElement('option');
      opt.value = w.id;
      opt.textContent = w.company ? w.name + '（' + w.company + '）' : w.name;
      sel.appendChild(opt);
    });
    const newOpt = document.createElement('option');
    newOpt.value = '__new__';
    newOpt.textContent = '＋ 新しく登録する';
    sel.appendChild(newOpt);
    sel.onchange = onWorkerChange;
  } catch(e) { showError('作業員データの読み込みに失敗しました'); }
}

async function loadSites() {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/sites?select=name&order=name`, { headers: HEADERS });
    const sites = await res.json();
    const dl = document.getElementById('siteList');
    sites.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.name;
      dl.appendChild(opt);
    });
  } catch(e) {}
}

function onWorkerChange() {
  const val = document.getElementById('workerSelect').value;
  const newArea = document.getElementById('newWorkerArea');
  const preview = document.getElementById('ratePreview');
  if (val === '__new__') {
    newArea.classList.add('open');
    preview.classList.remove('show');
    selectedWorker = null;
  } else if (val) {
    newArea.classList.remove('open');
    selectedWorker = workers.find(w => w.id === val);
    showRatePreview();
  } else {
    newArea.classList.remove('open');
    preview.classList.remove('show');
    selectedWorker = null;
  }
}

function showRatePreview(matchedKey) {
  if (!selectedWorker) return;
  const preview = document.getElementById('ratePreview');
  preview.classList.add('show');
  document.getElementById('baseRateText').textContent = `日当: ¥${selectedWorker.daily_rate.toLocaleString()}`;
  const rateList = document.getElementById('rateList');
  const rates = selectedWorker.work_rates || {};
  rateList.innerHTML = '';
  if (Object.keys(rates).length > 0) {
    Object.entries(rates).forEach(([k, v]) => {
      const badge = document.createElement('span');
      badge.className = 'rate-badge' + (k === matchedKey ? ' active' : '');
      badge.textContent = `${k}: ¥${Number(v).toLocaleString()}`;
      rateList.appendChild(badge);
    });
  }
  const note = document.getElementById('rateMatchNote');
  if (matchedKey) {
    const rate = rates[matchedKey];
    note.textContent = `✅ "${matchedKey}" の単価 ¥${Number(rate).toLocaleString()} を適用`;
    document.getElementById('baseRateText').textContent = `適用日当: ¥${Number(rate).toLocaleString()}`;
  } else {
    note.textContent = '';
    document.getElementById('baseRateText').textContent = `日当: ¥${selectedWorker.daily_rate.toLocaleString()}`;
  }
}

function matchWorkRate() {
  if (!selectedWorker) return;
  const content = document.getElementById('workContent').value;
  const rates = selectedWorker.work_rates || {};
  let matched = null;
  Object.keys(rates).forEach(k => {
    if (content.includes(k)) matched = k;
  });
  showRatePreview(matched);
}

function getAppliedRate() {
  if (!selectedWorker) return 15000;
  const content = document.getElementById('workContent').value;
  const rates = selectedWorker.work_rates || {};
  for (const [k, v] of Object.entries(rates)) {
    if (content.includes(k)) return Number(v);
  }
  return selectedWorker.daily_rate;
}

async function registerWorker() {
  const name = document.getElementById('newName').value.trim();
  if (!name) return showError('氏名は必須です');
  const btn = document.getElementById('registerWorkerBtn');
  btn.disabled = true; btn.textContent = '登録中...';
  try {
    const res = await fetch(`${SB_URL}/rest/v1/workers`, {
      method: 'POST', headers: HEADERS,
      body: JSON.stringify({ name, company: '', daily_rate: 15000, is_active: true, work_rates: {}, company_id: null })
    });
    const data = await res.json();
    const newW = data[0];
    workers.push(newW);
    const sel = document.getElementById('workerSelect');
    const opt = document.createElement('option');
    opt.value = newW.id; opt.textContent = newW.company ? newW.name + '（' + newW.company + '）' : newW.name;
    sel.insertBefore(opt, sel.lastElementChild);
    sel.value = newW.id;
    selectedWorker = newW;
    document.getElementById('newWorkerArea').classList.remove('open');
    showRatePreview();
  } catch(e) { showError('登録に失敗しました'); }
  btn.disabled = false; btn.textContent = '＋ 登録する';
}

function selectStatus(status) {
  currentStatus = status;
  ['present','absent','late'].forEach(s => {
    document.getElementById(`tab-${s}`).className = 'status-tab';
  });
  document.getElementById(`tab-${status}`).className = `status-tab selected-${status}`;
  document.getElementById('absentArea').classList.toggle('show', status === 'absent');
  document.getElementById('lateArea').classList.toggle('show', status === 'late');
  document.getElementById('workDetailCard').style.display = (status === 'absent') ? 'none' : 'block';
}

function toggleDateEdit() {
  const input = document.getElementById('workDate');
  const display = document.getElementById('workDateDisplay');
  const btn = document.getElementById('dateEditBtn');
  if (input.style.display === 'none') {
    input.style.display = 'block';
    display.style.display = 'none';
    btn.textContent = '✓ 確定';
    input.onchange = () => {
      document.getElementById('dateText').textContent = formatDateJP(input.value);
    };
  } else {
    input.style.display = 'none';
    display.style.display = 'flex';
    btn.textContent = '📝 日付を変更する';
  }
}

function previewPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    photoBase64 = ev.target.result;
    document.getElementById('photoImg').src = photoBase64;
    document.getElementById('photoPreview').style.display = 'block';
    document.querySelector('.photo-upload-area .upload-icon').textContent = '✅';
    document.querySelector('.photo-upload-area p').textContent = '写真選択済み';
  };
  reader.readAsDataURL(file);
}

function removePhoto() {
  photoBase64 = null;
  document.getElementById('meterPhoto').value = '';
  document.getElementById('photoPreview').style.display = 'none';
  document.querySelector('.photo-upload-area .upload-icon').textContent = '📷';
  document.querySelector('.photo-upload-area p').textContent = 'タップして写真を撮影 / 選択';
}

async function submitReport() {
  hideError();
  const workerId = document.getElementById('workerSelect').value;
  if (!workerId || workerId === '__new__') return showError('作業員を選択してください');
  const workDate = document.getElementById('workDate').value;
  const btn = document.getElementById('submitBtn');

  // 欠勤の場合
  if (currentStatus === 'absent') {
    const absentReason = document.getElementById('absentReason').value;
    const absentNote = document.getElementById('absentNote').value.trim();
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>送信中...';
    try {
      const payload = {
        work_date: workDate,
        worker_id: workerId,
        worker_name: selectedWorker.name,
        company: selectedWorker.company,
        site_name: '',
        work_content: '',
        work_hours: 0,
        daily_rate: 0,
        status: 'absent',
        absent_reason: absentReason || null,
        absent_note: absentNote || null,
        late_time: null,
        late_reason: null,
        meter_photo_url: photoBase64 || null,
        company_id: null
      };
      await postLog(payload);
      showSuccess({
        type: 'absent',
        name: selectedWorker.name,
        date: formatDateJP(workDate),
        reason: absentReason || '未記入',
        note: absentNote || ''
      });
    } catch(e) { showError('送信に失敗しました: ' + e.message); }
    btn.disabled = false; btn.innerHTML = '📤 報告を送信する';
    return;
  }

  // 出勤・遅刻
  const siteName = document.getElementById('siteName').value.trim();
  const workContent = document.getElementById('workContent').value.trim();
  if (!siteName) return showError('現場名を入力してください');
  if (!workContent) return showError('作業内容を入力してください');

  let lateTime = null, lateReason = null;
  if (currentStatus === 'late') {
    lateTime = document.getElementById('lateTime').value;
    lateReason = document.getElementById('lateReason').value.trim() || null;
    if (!lateTime) return showError('出勤時刻を入力してください');
  }

  const appliedRate = getAppliedRate();
  const workHours = parseFloat(document.getElementById('workHours').value) || 8.0;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>送信中...';
  try {
    const payload = {
      work_date: workDate,
      worker_id: workerId,
      worker_name: selectedWorker.name,
      company: selectedWorker.company,
      site_name: siteName,
      work_content: workContent,
      work_hours: workHours,
      daily_rate: appliedRate,
      status: currentStatus,
      absent_reason: null,
      absent_note: null,
      late_time: lateTime,
      late_reason: lateReason,
      meter_photo_url: photoBase64 || null,
      company_id: null
    };
    await postLog(payload);

    // 新しい現場名をsitesに自動追加（存在しない場合）
    await addSiteIfNew(siteName, selectedWorker.company);

    showSuccess({
      type: currentStatus,
      name: selectedWorker.name,
      date: formatDateJP(workDate),
      site: siteName,
      content: workContent,
      rate: appliedRate,
      hours: workHours,
      lateTime
    });
  } catch(e) { showError('送信に失敗しました: ' + e.message); }
  btn.disabled = false; btn.innerHTML = '📤 報告を送信する';
}

async function postLog(payload) {
  const res = await fetch(`${SB_URL}/rest/v1/attendance_logs`, {
    method: 'POST',
    headers: HEADERS,
    body: JSON.stringify(payload)
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || 'DB error');
  }
}

async function addSiteIfNew(name, company) {
  try {
    const check = await fetch(`${SB_URL}/rest/v1/sites?name=eq.${encodeURIComponent(name)}`, { headers: HEADERS });
    const existing = await check.json();
    if (existing.length === 0) {
      await fetch(`${SB_URL}/rest/v1/sites`, {
        method: 'POST', headers: { ...HEADERS, Prefer: 'return=minimal' },
        body: JSON.stringify({ name, company })
      });
    }
  } catch(e) {}
}

function showSuccess(info) {
  document.getElementById('mainForm').style.display = 'none';
  const screen = document.getElementById('successScreen');
  screen.classList.add('show');
  let icon, title, rows;
  if (info.type === 'absent') {
    icon = '🏠'; title = '欠勤報告を送信しました';
    rows = [
      { label: '氏名', val: info.name },
      { label: '日付', val: info.date },
      { label: '欠勤理由', val: info.reason },
      info.note ? { label: '備考', val: info.note } : null
    ].filter(Boolean);
    screen.className = 'show success-absent';
  } else if (info.type === 'late') {
    icon = '⏰'; title = '遅刻報告を送信しました';
    rows = [
      { label: '氏名', val: info.name },
      { label: '日付', val: info.date },
      { label: '出勤時刻', val: info.lateTime },
      { label: '現場', val: info.site },
      { label: '作業内容', val: info.content },
      { label: '適用日当', val: `¥${info.rate.toLocaleString()}` }
    ];
    screen.className = 'show success-late';
  } else {
    icon = '✅'; title = '出勤報告を送信しました！';
    rows = [
      { label: '氏名', val: info.name },
      { label: '日付', val: info.date },
      { label: '現場', val: info.site },
      { label: '作業内容', val: info.content },
      { label: '勤務時間', val: `${info.hours}h` },
      { label: '適用日当', val: `¥${info.rate.toLocaleString()}` }
    ];
    screen.className = 'show';
  }
  document.getElementById('successIcon').textContent = icon;
  document.getElementById('successTitle').textContent = title;
  const det = document.getElementById('successDetail');
  det.innerHTML = rows.map(r => `<div class="row"><span>${r.label}</span><span class="val">${r.val}</span></div>`).join('');
}

function resetForm() {
  document.getElementById('mainForm').style.display = 'block';
  document.getElementById('successScreen').classList.remove('show');
  document.getElementById('successScreen').className = '';
  document.getElementById('workerSelect').value = '';
  document.getElementById('ratePreview').classList.remove('show');
  document.getElementById('newWorkerArea').classList.remove('open');
  document.getElementById('siteName').value = '';
  document.getElementById('workContent').value = '';
  document.getElementById('workHours').value = '8.0';
  selectStatus('present');
  removePhoto();
  selectedWorker = null;
  hideError();
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = '⚠️ ' + msg;
  el.classList.add('show');
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}

document.addEventListener('click', function(e) {
  const wrapper = document.querySelector('.custom-select-wrapper');
  if (wrapper && !wrapper.contains(e.target)) {
    // カスタムドロップダウンが将来追加された場合の外クリック処理
  }
});

// 新規登録エリアのクリックが外部に伝播しないよう制御
document.addEventListener('DOMContentLoaded', function() {
  const newArea = document.getElementById('newWorkerArea');
  if (newArea) {
    newArea.addEventListener('click', function(e) { e.stopPropagation(); });
  }
  const registerBtn = document.getElementById('registerWorkerBtn');
  if (registerBtn) {
    registerBtn.addEventListener('click', function(e) { e.stopPropagation(); });
  }
});
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>出勤報告｜建設日報システム</title>
  <!--
  ================================================================
  Supabase テーブル拡張 SQL
  ================================================================
  -- attendance_logs に以下カラムを追加（未実施の場合のみ）
  ALTER TABLE attendance_logs ADD COLUMN IF NOT EXISTS worker_name  text;
  ALTER TABLE attendance_logs ADD COLUMN IF NOT EXISTS company      text;
  ALTER TABLE attendance_logs ADD COLUMN IF NOT EXISTS site_name    text;
  ALTER TABLE attendance_logs ADD COLUMN IF NOT EXISTS work_content text;
  ALTER TABLE attendance_logs ADD COLUMN IF NOT EXISTS submitted_at timestamptz DEFAULT now();

  -- RLS（anon キー使用時）
  CREATE POLICY IF NOT EXISTS "attend_insert" ON attendance_logs FOR INSERT TO anon WITH CHECK (true);
  CREATE POLICY IF NOT EXISTS "attend_select" ON attendance_logs FOR SELECT TO anon USING (true);
  ================================================================
  -->
  <style>
    :root {
      --green:        #1a7a4a;
      --green-dark:   #135c38;
      --green-light:  #22a05a;
      --green-pale:   #d1fae5;
      --bg:           #0d1f15;
      --bg2:          #152b1e;
      --card:         #1c3527;
      --card2:        #243d2f;
      --border:       #2d5240;
      --text:         #e8f5ee;
      --muted:        #7aaa8e;
      --yellow:       #fbbf24;
      --red:          #ef4444;
      --white:        #ffffff;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html { scroll-behavior:smooth; }
    body {
      background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
      min-height:100vh; padding-bottom:40px;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      background:var(--green-dark);
      padding:16px 20px 14px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:3px solid var(--green-light);
      position:sticky; top:0; z-index:100;
    }
    .h-logo {
      display:flex; align-items:center; gap:10px;
    }
    .h-icon {
      width:40px; height:40px; background:var(--green-light);
      border-radius:10px; display:flex; align-items:center; justify-content:center;
      font-size:20px;
    }
    .h-title { font-size:17px; font-weight:800; color:var(--white); }
    .h-sub   { font-size:11px; color:rgba(255,255,255,.65); margin-top:1px; }
    .h-date  {
      text-align:right; font-size:13px; color:rgba(255,255,255,.8);
      line-height:1.5; font-weight:600;
    }

    /* ── Main ────────────────────────────────────────────── */
    main { max-width:520px; margin:0 auto; padding:20px 16px; }

    /* ── Success Screen ──────────────────────────────────── */
    #successScreen {
      display:none; flex-direction:column; align-items:center; justify-content:center;
      min-height:60vh; text-align:center; padding:40px 20px;
      animation:fadeUp .5s ease both;
    }
    #successScreen.show { display:flex; }
    .success-icon { font-size:80px; margin-bottom:20px; }
    .success-title {
      font-size:26px; font-weight:900; color:var(--green-light);
      margin-bottom:10px; line-height:1.3;
    }
    .success-sub { font-size:15px; color:var(--muted); margin-bottom:32px; line-height:1.7; }
    .success-info {
      background:var(--card); border:1px solid var(--border);
      border-radius:14px; padding:20px 24px; width:100%; max-width:360px;
      text-align:left; margin-bottom:28px;
    }
    .success-info-row {
      display:flex; justify-content:space-between; align-items:flex-start;
      padding:8px 0; border-bottom:1px solid var(--border); gap:12px;
      font-size:14px;
    }
    .success-info-row:last-child { border-bottom:none; }
    .success-info-label { color:var(--muted); font-size:12px; white-space:nowrap; }
    .success-info-value { font-weight:700; text-align:right; word-break:break-word; }
    .btn-retry {
      background:var(--card2); color:var(--text); border:1px solid var(--border);
      padding:14px 32px; border-radius:12px; font-size:15px; font-weight:700;
      width:100%; max-width:320px;
    }

    /* ── Form Screen ─────────────────────────────────────── */
    #formScreen { animation:fadeUp .4s ease both; }

    /* ── Section Title ───────────────────────────────────── */
    .section-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:16px; padding:20px; margin-bottom:16px;
    }
    .section-hd {
      display:flex; align-items:center; gap:8px;
      margin-bottom:16px; padding-bottom:12px;
      border-bottom:1px solid var(--border);
    }
    .section-ico {
      width:30px; height:30px; background:rgba(34,160,90,.2);
      border-radius:8px; display:flex; align-items:center; justify-content:center;
      font-size:15px; flex-shrink:0;
    }
    .section-title { font-size:14px; font-weight:800; }

    /* ── Field Group ─────────────────────────────────────── */
    .fg { margin-bottom:14px; }
    .fg:last-child { margin-bottom:0; }
    .fg label {
      display:block; font-size:12px; font-weight:800; color:var(--muted);
      margin-bottom:8px; text-transform:uppercase; letter-spacing:.6px;
    }
    .fg input, .fg textarea {
      width:100%; background:var(--card2); border:2px solid var(--border);
      color:var(--text); padding:14px 16px; border-radius:12px;
      font-size:16px; font-family:inherit; transition:border-color .2s;
      -webkit-appearance:none; appearance:none;
    }
    .fg input:focus, .fg textarea:focus {
      outline:none; border-color:var(--green-light);
    }
    .fg input[readonly] {
      opacity:.6; cursor:default;
    }
    .fg textarea { resize:vertical; min-height:96px; line-height:1.6; }

    /* ── Quick Select Buttons ────────────────────────────── */
    .quick-btns {
      display:flex; flex-wrap:wrap; gap:7px; margin-top:10px;
    }
    .quick-btn {
      background:var(--card2); border:1px solid var(--border);
      color:var(--muted); padding:7px 13px; border-radius:20px;
      font-size:12px; font-weight:700; transition:all .15s;
      font-family:inherit;
    }
    .quick-btn:active, .quick-btn.selected {
      background:rgba(34,160,90,.2); border-color:var(--green-light);
      color:var(--green-light);
    }

    /* ── Submit ──────────────────────────────────────────── */
    .submit-wrap { padding:0 0 8px; }
    .btn-submit {
      width:100%; background:linear-gradient(135deg,var(--green-light),var(--green-dark));
      color:#fff; border:none; padding:18px; border-radius:16px;
      font-size:18px; font-weight:900; letter-spacing:.5px;
      box-shadow:0 4px 20px rgba(34,160,90,.4);
      display:flex; align-items:center; justify-content:center; gap:10px;
      transition:all .2s; font-family:inherit;
    }
    .btn-submit:active { transform:scale(.98); box-shadow:0 2px 10px rgba(34,160,90,.3); }
    .btn-submit:disabled { opacity:.5; pointer-events:none; }
    .btn-submit-sub { font-size:12px; opacity:.8; font-weight:600; margin-top:3px; }

    /* ── Toast / Spinner ─────────────────────────────────── */
    .spinner {
      display:none; width:22px; height:22px; border:3px solid rgba(255,255,255,.3);
      border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite;
    }
    .spinner.show { display:inline-block; }
    .toast {
      position:fixed; bottom:24px; left:50%;
      transform:translateX(-50%) translateY(80px);
      padding:12px 24px; border-radius:100px; font-size:14px; font-weight:700;
      color:#fff; background:#1c3527; z-index:400;
      transition:transform .3s cubic-bezier(.34,1.56,.64,1);
      white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,.5);
    }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .toast.ok  { background:var(--green); }
    .toast.err { background:var(--red); }

    /* ── Animations ──────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── Misc ────────────────────────────────────────────── */
    .hint { font-size:11px; color:var(--muted); margin-top:5px; }
    .demo-badge {
      background:rgba(251,191,36,.15); border:1px solid rgba(251,191,36,.35);
      color:var(--yellow); font-size:11px; font-weight:700;
      padding:4px 10px; border-radius:6px; margin-bottom:14px;
      display:flex; align-items:center; gap:6px;
    }
    .demo-badge.hidden { display:none; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="h-logo">
    <div class="h-icon">🏗️</div>
    <div>
      <div class="h-title">出勤報告</div>
      <div class="h-sub">毎朝の出勤をここから報告</div>
    </div>
  </div>
  <div class="h-date" id="headerDate"></div>
</header>

<main>

  <!-- Success Screen -->
  <div id="successScreen">
    <div class="success-icon">✅</div>
    <div class="success-title">出勤を記録しました！</div>
    <div class="success-sub">お疲れ様です。本日も安全作業でお願いします。</div>
    <div class="success-info" id="successInfo"></div>
    <button class="btn-retry" onclick="showForm()">🔄 もう一度報告する</button>
  </div>

  <!-- Form Screen -->
  <div id="formScreen">

    <div class="demo-badge" id="demoBadge">
      🎭 デモモード（Supabase未設定）
    </div>

    <!-- 基本情報 -->
    <div class="section-card">
      <div class="section-hd">
        <div class="section-ico">📋</div>
        <div class="section-title">基本情報</div>
      </div>

      <div class="fg">
        <label>作業日</label>
        <input type="text" id="workDate" readonly>
      </div>

      <div class="fg">
        <label>お名前 <span style="color:var(--red);">*</span></label>
        <input type="text" id="workerName" placeholder="山田 太郎" autocomplete="name" inputmode="text">
      </div>
    </div>

    <!-- 現場情報 -->
    <div class="section-card">
      <div class="section-hd">
        <div class="section-ico">🏢</div>
        <div class="section-title">現場情報</div>
      </div>

      <div class="fg">
        <label>元請会社名</label>
        <input type="text" id="company" placeholder="〇〇建設株式会社" list="companyList" autocomplete="organization">
        <datalist id="companyList"></datalist>
      </div>

      <div class="fg">
        <label>現場名</label>
        <input type="text" id="siteName" placeholder="R6-法面崩壊防止工事 福岡082" list="siteList">
        <datalist id="siteList"></datalist>
      </div>
    </div>

    <!-- 作業内容 -->
    <div class="section-card">
      <div class="section-hd">
        <div class="section-ico">⛏️</div>
        <div class="section-title">作業内容</div>
      </div>

      <div class="fg">
        <label>本日の作業内容</label>
        <textarea id="workContent" placeholder="例：法面工事（コンクリート吹付）&#10;法枠工 約50㎡施工予定"></textarea>
        <div class="hint">タップで入力、または下のボタンから選択</div>
        <div class="quick-btns" id="quickBtns">
          <button class="quick-btn" onclick="appendContent('法面工事')">法面工事</button>
          <button class="quick-btn" onclick="appendContent('土工')">土工</button>
          <button class="quick-btn" onclick="appendContent('吹付工')">吹付工</button>
          <button class="quick-btn" onclick="appendContent('アンカー工')">アンカー工</button>
          <button class="quick-btn" onclick="appendContent('法枠工')">法枠工</button>
          <button class="quick-btn" onclick="appendContent('排水工')">排水工</button>
          <button class="quick-btn" onclick="appendContent('型枠工')">型枠工</button>
          <button class="quick-btn" onclick="appendContent('コンクリート打設')">コンクリート打設</button>
          <button class="quick-btn" onclick="appendContent('鉄筋工')">鉄筋工</button>
          <button class="quick-btn" onclick="appendContent('交通誘導')">交通誘導</button>
          <button class="quick-btn" onclick="appendContent('重機作業')">重機作業</button>
          <button class="quick-btn" onclick="appendContent('片付け・清掃')">片付け・清掃</button>
        </div>
      </div>
    </div>

    <!-- Submit -->
    <div class="submit-wrap">
      <button class="btn-submit" id="submitBtn" onclick="submitAttendance()">
        <span id="submitIcon">🏁</span>
        <div>
          <div>出勤を報告する</div>
          <div class="btn-submit-sub">タップして送信</div>
        </div>
        <div class="spinner" id="spinner"></div>
      </button>
    </div>

  </div><!-- /formScreen -->

</main>

<div class="toast" id="toast"></div>

<datalist id="contentList"></datalist>

<script>
// ══════════════════════════════════════════════════════════════
// Constants / Util
// ══════════════════════════════════════════════════════════════
const LS = {
  name:       'wa_name',
  company:    'wa_company',
  site:       'wa_site',
  content:    'wa_content',
  companies:  'wa_companies',   // JSON array
  sites:      'wa_sites',       // JSON array
  sbUrl:      'dr_sb_url',
  sbKey:      'dr_sb_key',
};

const today = new Date();
const todayStr = today.toISOString().slice(0,10);
const todayLabel = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日（${'日月火水木金土'[today.getDay()]}）`;

let _tt;
function toast(msg, type='', dur=3500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(_tt); _tt = setTimeout(()=>{ t.className='toast'; }, dur);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getArr(key) {
  try { return JSON.parse(localStorage.getItem(key)||'[]'); } catch{ return []; }
}
function saveArr(key, val) {
  const arr = getArr(key);
  if (val && !arr.includes(val)) { arr.unshift(val); if(arr.length>20) arr.pop(); }
  localStorage.setItem(key, JSON.stringify(arr));
}

// ══════════════════════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════════════════════
(function init() {
  // Header date
  document.getElementById('headerDate').innerHTML = todayLabel.replace('（','<br>（');
  document.getElementById('workDate').value = todayLabel;

  // Restore last values
  document.getElementById('workerName').value  = localStorage.getItem(LS.name)    || '';
  document.getElementById('company').value     = localStorage.getItem(LS.company) || '';
  document.getElementById('siteName').value    = localStorage.getItem(LS.site)    || '';
  document.getElementById('workContent').value = localStorage.getItem(LS.content) || '';

  // Datalist
  buildDatalist('companyList', getArr(LS.companies));
  buildDatalist('siteList',    getArr(LS.sites));

  // Demo badge
  const url = localStorage.getItem(LS.sbUrl)||'';
  const key = localStorage.getItem(LS.sbKey)||'';
  if (url && key) document.getElementById('demoBadge').classList.add('hidden');
})();

function buildDatalist(id, arr) {
  const dl = document.getElementById(id);
  dl.innerHTML = arr.map(v => `<option value="${esc(v)}">`).join('');
}

// ══════════════════════════════════════════════════════════════
// Quick select
// ══════════════════════════════════════════════════════════════
function appendContent(text) {
  const ta = document.getElementById('workContent');
  const cur = ta.value.trim();
  ta.value = cur ? cur + '\n' + text : text;
  // Highlight button briefly
  event.target.classList.add('selected');
  setTimeout(()=> event.target.classList.remove('selected'), 600);
  ta.focus();
}

// ══════════════════════════════════════════════════════════════
// Submit
// ══════════════════════════════════════════════════════════════
async function submitAttendance() {
  const name    = document.getElementById('workerName').value.trim();
  const company = document.getElementById('company').value.trim();
  const site    = document.getElementById('siteName').value.trim();
  const content = document.getElementById('workContent').value.trim();

  if (!name) { toast('お名前を入力してください','err'); document.getElementById('workerName').focus(); return; }

  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const icon    = document.getElementById('submitIcon');
  btn.disabled = true;
  spinner.classList.add('show');
  icon.style.display = 'none';

  const record = {
    work_date:    todayStr,
    worker_name:  name,
    company:      company,
    site_name:    site,
    work_content: content,
    status:       'present',
    work_hours:   8.0,
    submitted_at: new Date().toISOString(),
  };

  const sbUrl = localStorage.getItem(LS.sbUrl)||'';
  const sbKey = localStorage.getItem(LS.sbKey)||'';
  let saved = false;

  if (sbUrl && sbKey) {
    try {
      const res = await fetch(sbUrl + '/rest/v1/attendance_logs', {
        method: 'POST',
        headers: {
          'apikey': sbKey,
          'Authorization': 'Bearer ' + sbKey,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify(record),
      });
      if (!res.ok) throw new Error(await res.text());
      saved = true;
    } catch(e) {
      btn.disabled = false;
      spinner.classList.remove('show');
      icon.style.display = '';
      toast('送信エラー: ' + e.message, 'err', 5000);
      return;
    }
  } else {
    // Demo mode — just simulate
    await new Promise(r => setTimeout(r, 800));
    saved = true;
  }

  if (saved) {
    // Save to localStorage
    localStorage.setItem(LS.name,    name);
    localStorage.setItem(LS.company, company);
    localStorage.setItem(LS.site,    site);
    localStorage.setItem(LS.content, content);
    saveArr(LS.companies, company);
    saveArr(LS.sites,     site);

    showSuccess(record);
  }

  btn.disabled = false;
  spinner.classList.remove('show');
  icon.style.display = '';
}

// ══════════════════════════════════════════════════════════════
// Screens
// ══════════════════════════════════════════════════════════════
function showSuccess(r) {
  document.getElementById('successInfo').innerHTML = [
    ['作業日',    r.work_date],
    ['氏名',      r.worker_name],
    ['元請会社',  r.company || '—'],
    ['現場名',    r.site_name || '—'],
    ['作業内容',  r.work_content || '—'],
  ].map(([k,v]) => `
    <div class="success-info-row">
      <span class="success-info-label">${k}</span>
      <span class="success-info-value">${esc(v)}</span>
    </div>`).join('');

  document.getElementById('formScreen').style.display = 'none';
  const ss = document.getElementById('successScreen');
  ss.classList.add('show');
  window.scrollTo({ top:0, behavior:'smooth' });
}

function showForm() {
  document.getElementById('successScreen').classList.remove('show');
  document.getElementById('formScreen').style.display = '';
  window.scrollTo({ top:0, behavior:'smooth' });
}
</script>

<div style="text-align:center;padding:24px 16px 8px;font-size:12px;color:rgba(122,170,142,.5);">
  <a href="login.html" style="color:rgba(122,170,142,.5);text-decoration:none;border-bottom:1px solid rgba(122,170,142,.2);">
    管理者の方はこちら →
  </a>
</div>
</body>
</html>

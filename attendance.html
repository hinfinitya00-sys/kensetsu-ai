<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建設日報 管理画面</title>
<script src="js/auth.js"></script>
<script>KS_AUTH.checkAuth();</script>
<style>
:root {
  --navy: #0f172a;
  --navy2: #1e293b;
  --navy3: #334155;
  --accent: #22c55e;
  --accent2: #16a34a;
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --border: #334155;
  --warn: #f59e0b;
  --danger: #ef4444;
  --info: #3b82f6;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--navy);
  color: var(--text);
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  min-height: 100vh;
}

/* Header */
header {
  background: var(--navy2);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex; align-items: center;
  height: 56px; gap: 0;
  position: sticky; top: 0; z-index: 100;
}
.header-logo { font-weight: 700; font-size: 1rem; color: var(--accent); margin-right: 24px; white-space: nowrap; }
.tab-nav { display: flex; gap: 0; flex: 1; height: 100%; }
.tab-btn {
  background: none; border: none; color: var(--text-dim);
  padding: 0 18px; font-size: 0.85rem; cursor: pointer;
  height: 100%; border-bottom: 2px solid transparent;
  transition: all 0.2s; font-family: inherit; white-space: nowrap;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.header-right { margin-left: auto; }
.logout-btn {
  background: var(--navy3); border: 1px solid var(--border);
  color: var(--text-dim); padding: 6px 14px; border-radius: 6px;
  font-size: 0.8rem; cursor: pointer; font-family: inherit;
}
.logout-btn:hover { color: var(--text); }

/* Tab content */
.tab-content { display: none; padding: 24px 20px; max-width: 1100px; margin: 0 auto; }
.tab-content.active { display: block; }

/* Cards */
.card {
  background: var(--navy2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
}
.section-title {
  font-size: 1rem; font-weight: 700; margin-bottom: 16px;
  color: var(--text); display: flex; align-items: center; gap: 8px;
}

/* Stats */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
.stat-card {
  background: var(--navy2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
}
.stat-label { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 6px; }
.stat-value { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
.stat-value.warn { color: var(--warn); }
.stat-value.info { color: var(--info); }

/* Filters */
.filter-bar {
  display: flex; gap: 10px; align-items: flex-end;
  flex-wrap: wrap; margin-bottom: 16px;
}
.filter-bar label { font-size: 0.75rem; color: var(--text-dim); display: block; margin-bottom: 4px; }
.filter-bar select, .filter-bar input {
  background: var(--navy3); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; padding: 7px 10px;
  font-size: 0.85rem; outline: none; font-family: inherit;
}
.filter-bar select:focus, .filter-bar input:focus { border-color: var(--accent); }
.btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.85rem; font-family: inherit; font-weight: 600; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent2); }
.btn-secondary { background: var(--navy3); color: var(--text-dim); border: 1px solid var(--border); }
.btn-secondary:hover { color: var(--text); }
.btn-warn { background: var(--warn); color: white; }
.btn-danger { background: var(--danger); color: white; font-size: 0.75rem; padding: 4px 10px; }
.btn-small { padding: 4px 10px; font-size: 0.75rem; }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
thead th {
  background: var(--navy3); padding: 10px 12px;
  text-align: left; font-size: 0.75rem; color: var(--text-dim);
  white-space: nowrap; font-weight: 600; border-bottom: 1px solid var(--border);
}
tbody tr { border-bottom: 1px solid rgba(51,65,85,0.5); }
tbody tr:hover { background: rgba(30,41,59,0.6); }
tbody td { padding: 10px 12px; white-space: nowrap; }

/* Status badges */
.badge {
  display: inline-block; padding: 2px 10px; border-radius: 12px;
  font-size: 0.72rem; font-weight: 600;
}
.badge-present { background: rgba(34,197,94,0.15); color: var(--accent); border: 1px solid rgba(34,197,94,0.3); }
.badge-absent { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
.badge-late { background: rgba(245,158,11,0.15); color: var(--warn); border: 1px solid rgba(245,158,11,0.3); }

/* Photo thumbnail */
.photo-thumb {
  width: 40px; height: 30px; object-fit: cover;
  border-radius: 4px; cursor: pointer; border: 1px solid var(--border);
}
.photo-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85); z-index: 1000;
  align-items: center; justify-content: center;
}
.photo-modal.open { display: flex; }
.photo-modal img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
.photo-modal-close {
  position: absolute; top: 20px; right: 20px;
  background: rgba(255,255,255,0.1); border: none; color: white;
  width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* Worker cards */
.worker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.worker-card {
  background: var(--navy3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.worker-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 2px; }
.worker-company { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 10px; }
.worker-rate { font-size: 1.1rem; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
.rate-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
.rate-tag {
  background: var(--navy2); border: 1px solid var(--border);
  border-radius: 12px; padding: 2px 8px; font-size: 0.72rem; color: var(--text-dim);
}
.worker-actions { display: flex; gap: 8px; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 200;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--navy2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px; width: 100%; max-width: 480px;
  max-height: 90vh; overflow-y: auto;
}
.modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 20px; }
.modal label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 4px; }
.modal input, .modal select, .modal textarea {
  width: 100%; background: var(--navy3); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; padding: 8px 10px;
  font-size: 0.9rem; outline: none; font-family: inherit; margin-bottom: 12px;
}
.modal input:focus, .modal select:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

/* Work rates table in modal */
.rates-table { width: 100%; margin-bottom: 12px; }
.rates-table tr td { padding: 3px 4px; }
.rates-table input { margin-bottom: 0; }
.rates-table .rate-label { font-size: 0.8rem; color: var(--text-dim); padding-right: 8px; white-space: nowrap; }

/* Salary tab */
.salary-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.salary-table th {
  background: var(--navy3); padding: 10px 8px;
  text-align: left; font-size: 0.75rem; color: var(--text-dim);
  border-bottom: 1px solid var(--border);
}
.salary-table td { padding: 10px 8px; border-bottom: 1px solid rgba(51,65,85,0.5); vertical-align: middle; }
.salary-table input[type="number"] {
  width: 90px; background: var(--navy3); border: 1px solid var(--border);
  color: var(--text); border-radius: 4px; padding: 4px 6px;
  font-size: 0.82rem; outline: none; font-family: inherit;
}
.salary-table input:focus { border-color: var(--accent); }
.total-col { font-weight: 700; color: var(--accent); }
.salary-table tr:hover { background: rgba(30,41,59,0.5); }

/* Loading spinner */
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.empty-state { text-align: center; color: var(--text-dim); padding: 40px; font-size: 0.9rem; }

/* Detail row expandable */
.detail-cell { white-space: normal; max-width: 180px; font-size: 0.8rem; color: var(--text-dim); }
</style>
</head>
<body>

<header>
  <div class="header-logo">🏗️ 建設日報</div>
  <nav class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('attendance')">📋 出勤管理</button>
    <button class="tab-btn" onclick="switchTab('workers')">👷 作業員</button>
    <button class="tab-btn" onclick="switchTab('salary')">💰 給与計算</button>
  </nav>
  <div class="header-right">
    <button class="logout-btn" onclick="logout()">ログアウト</button>
  </div>
</header>

<!-- ========== TAB 1: 出勤管理 ========== -->
<div class="tab-content active" id="tab-attendance">
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">出勤件数</div><div class="stat-value" id="stat-count">-</div></div>
    <div class="stat-card"><div class="stat-label">欠勤件数</div><div class="stat-value warn" id="stat-absent">-</div></div>
    <div class="stat-card"><div class="stat-label">遅刻件数</div><div class="stat-value" style="color:var(--warn)" id="stat-late">-</div></div>
    <div class="stat-card"><div class="stat-label">ユニーク人数</div><div class="stat-value info" id="stat-workers">-</div></div>
    <div class="stat-card"><div class="stat-label">人件費合計</div><div class="stat-value" id="stat-cost">-</div></div>
  </div>

  <div class="card">
    <div class="filter-bar">
      <div>
        <label>年</label>
        <select id="filterYear"></select>
      </div>
      <div>
        <label>月</label>
        <select id="filterMonth">
          <option value="">全月</option>
          <option value="01">1月</option><option value="02">2月</option><option value="03">3月</option>
          <option value="04">4月</option><option value="05">5月</option><option value="06">6月</option>
          <option value="07">7月</option><option value="08">8月</option><option value="09">9月</option>
          <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
        </select>
      </div>

        <label>作業員名</label>
        <input type="text" id="filterName" placeholder="氏名で検索" style="width:140px">
      </div>
      <div>
        <label>ステータス</label>
        <select id="filterStatus">
          <option value="">全て</option>

          <option value="absent">欠勤</option>

      </div>
      <button class="btn btn-primary" onclick="loadAttendance()">🔍 更新</button>
      <button class="btn btn-secondary" onclick="exportCSV()">📥 CSV出力</button>

    <div class="table-wrap">

            <th>氏名</th>
            <th>元請会社</th>
            <th>現場名</th>
            <th>作業内容</th>
            <th>日当</th>
            <th>時間</th>
            <th>状態</th>
            <th>遅刻時刻</th>
            <th>欠勤理由</th>
            <th>メーター</th>
            <th>送信日時</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="attendanceBody">
          <tr><td colspan="13" class="empty-state">データを読み込み中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ========== TAB 2: 作業員 ========== -->
<div class="tab-content" id="tab-workers">
  <div style="display:flex; justify-content:flex-end; margin-bottom:16px">
    <button class="btn btn-primary" onclick="openWorkerModal(null)">＋ 作業員を追加</button>
  </div>
  <div class="worker-grid" id="workerGrid">
    <div class="empty-state">読み込み中...</div>
  </div>
</div>

<!-- ========== TAB 3: 給与計算 ========== -->
<div class="tab-content" id="tab-salary">
  <div class="card">
    <div class="filter-bar">
      <div>
        <label>年</label>
        <select id="salaryYear"></select>
      </div>
      <div>
        <label>月</label>
        <select id="salaryMonth">
          <option value="01">1月</option><option value="02">2月</option><option value="03">3月</option>
          <option value="04">4月</option><option value="05">5月</option><option value="06">6月</option>
          <option value="07">7月</option><option value="08">8月</option><option value="09">9月</option>
          <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="loadSalary()">📊 集計</button>
    </div>
    <div class="table-wrap">
      <table class="salary-table">
        <thead>
          <tr>
            <th>氏名</th>
            <th>出勤日数</th>
            <th>基本給合計</th>
            <th>交通費</th>
            <th>手当</th>

    </div>
  </div>
</div>

<!-- 出勤記録編集モーダル -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">出勤記録を編集</div>
    <input type="hidden" id="editId">
    <label>作業日</label><input type="date" id="editDate">
    <label>氏名</label><input type="text" id="editName">
    <label>元請会社</label><input type="text" id="editCompany">
    <label>現場名</label><input type="text" id="editSite">
    <label>作業内容</label><input type="text" id="editContent">
    <label>日当（円）</label><input type="number" id="editRate" step="500">
    <label>勤務時間</label><input type="number" id="editHours" step="0.5">
    <label>ステータス</label>
    <select id="editStatus">
      <option value="present">出勤</option><option value="absent">欠勤</option>
      <option value="vacation">休暇</option><option value="late">遅刻</option>
    </select>
    <label>欠勤理由</label><input type="text" id="editAbsentReason">
    <label>遅刻時刻</label><input type="time" id="editLateTime">
    <label>遅刻理由</label><input type="text" id="editLateReason">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeEditModal()">キャンセル</button>
      <button class="btn btn-danger" id="deleteEditBtn" onclick="deleteAttendanceRecord()">🗑️ 削除</button>
      <button class="btn btn-primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- 作業員モーダル -->
<div class="modal-overlay" id="workerModal">
  <div class="modal">
    <div class="modal-title" id="workerModalTitle">作業員を追加</div>
    <label>氏名 *</label>
    <input type="text" id="mName" placeholder="山田 太郎">
    <label>会社名 *</label>
    <input type="text" id="mCompany" placeholder="株式会社○○建設">

    <input type="number" id="mRate" value="15000" min="0" step="500">
    <label style="margin-bottom:8px">工種別単価</label>
    <table class="rates-table">
      <tbody id="ratesRows"></tbody>
    </table>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeWorkerModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveWorker()">保存</button>
    </div>
  </div>
</div>

<!-- 写真モーダル -->
<div class="photo-modal" id="photoModal" onclick="this.classList.remove('open')">
  <button class="photo-modal-close" onclick="document.getElementById('photoModal').classList.remove('open')">✕</button>
  <img id="photoModalImg" src="" alt="メーター写真">
</div>

<script>
const SB_URL = 'https://bjohdzcoziezdkqcebhe.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqb2hkemNvemllemRrcWNlYmhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTI5NTAsImV4cCI6MjA4ODg4ODk1MH0.SUZ35eULi_RQzNPDQG2n5cBJCdTDXJZ1pB307ZNbSPU';
function getAuthHeaders(prefer = 'return=representation') {
  const raw = localStorage.getItem('sb-bjohdzcoziezdkqcebhe-auth-token');
  let token = SB_KEY;
  try { const d = JSON.parse(raw); token = d?.access_token || SB_KEY; } catch {}
  return { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token, 'Prefer': prefer };
}
const H = getAuthHeaders();
function getCompanyId() {
  if (typeof KS_AUTH !== 'undefined' && KS_AUTH.getCompanyId()) return KS_AUTH.getCompanyId();
  try { const raw = localStorage.getItem('ks_company'); return raw ? JSON.parse(raw)?.id || '' : ''; } catch { return ''; }
}
const COMPANY_ID = getCompanyId();

const RATE_KEYS = ['法面工事','吹付工','アンカー工','コンクリート打設','鉄筋工','交通誘導','重機作業'];

function openEditModal(id) {
  const r = attendanceData.find(x => x.id === id);
  if (!r) return;
  document.getElementById('editId').value = r.id;
  document.getElementById('editDate').value = r.work_date || '';
  document.getElementById('editName').value = r.worker_name || '';
  document.getElementById('editCompany').value = r.company || '';
  document.getElementById('editSite').value = r.site_name || '';
  document.getElementById('editContent').value = r.work_content || '';
  document.getElementById('editRate').value = r.daily_rate || 0;
  document.getElementById('editHours').value = r.work_hours || 8;
  document.getElementById('editStatus').value = r.status || 'present';
  document.getElementById('editAbsentReason').value = r.absent_reason || '';
  document.getElementById('editLateTime').value = r.late_time || '';
  document.getElementById('editLateReason').value = r.late_reason || '';
  const db = document.getElementById('deleteEditBtn');
  if (r.is_deleted) { db.textContent = '↩️ 削除取消'; db.style.background = 'var(--warn)'; }
  else { db.textContent = '🗑️ 削除'; db.style.background = ''; }
  document.getElementById('editModal').classList.add('open');
}
function closeEditModal() { document.getElementById('editModal').classList.remove('open'); }
async function saveEdit() {
  const id = document.getElementById('editId').value;
  const payload = {
    work_date: document.getElementById('editDate').value,
    worker_name: document.getElementById('editName').value,
    company: document.getElementById('editCompany').value,
    site_name: document.getElementById('editSite').value,
    work_content: document.getElementById('editContent').value,
    daily_rate: parseInt(document.getElementById('editRate').value) || 0,
    work_hours: parseFloat(document.getElementById('editHours').value) || 8,
    status: document.getElementById('editStatus').value,
    absent_reason: document.getElementById('editAbsentReason').value || null,
    late_time: document.getElementById('editLateTime').value || null,
    late_reason: document.getElementById('editLateReason').value || null,
  };
  try {
    const res = await fetch(SB_URL + '/rest/v1/attendance_logs?id=eq.' + id, { method: 'PATCH', headers: H, body: JSON.stringify(payload) });
    if (!res.ok) throw new Error(await res.text());
    closeEditModal(); await loadAttendance();
  } catch(e) { alert('保存失敗: ' + e.message); }
}
async function deleteAttendanceRecord() {
  const id = document.getElementById('editId').value;
  const r = attendanceData.find(x => x.id === id);
  if (!r) return;
  const isDeleted = !!r.is_deleted;
  if (!confirm(isDeleted ? '削除を取り消しますか？' : '削除しますか？\n※履歴として残ります。')) return;
  try {
    const res = await fetch(SB_URL + '/rest/v1/attendance_logs?id=eq.' + id, { method: 'PATCH', headers: H, body: JSON.stringify({ is_deleted: !isDeleted }) });
    if (!res.ok) throw new Error(await res.text());
    closeEditModal(); await loadAttendance();
  } catch(e) { alert('操作失敗: ' + e.message); }
}

let editingWorkerId = null;
let attendanceData = [];

// 初期化
window.onload = () => {
  const now = new Date();
  // 年セレクト
  [document.getElementById('filterYear'), document.getElementById('salaryYear')].forEach(sel => {
    for (let y = now.getFullYear(); y >= now.getFullYear()-3; y--) {
      const o = document.createElement('option');
      o.value = y; o.textContent = y + '年';
      if (y === now.getFullYear()) o.selected = true;
      sel.appendChild(o);
    }
  });
  // 月セレクト
  const mn = String(now.getMonth()+1).padStart(2,'0');
  document.getElementById('filterMonth').value = mn;
  document.getElementById('salaryMonth').value = mn;
  loadAttendance();
  loadWorkers();
};

function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  event.target.classList.add('active');
}

function logout() {
  if (typeof KS_AUTH !== 'undefined') KS_AUTH.logout();
  else location.reload();
}

// ========== 出勤管理 ==========
async function loadAttendance() {
  const year = document.getElementById('filterYear').value;
  const month = document.getElementById('filterMonth').value;
  const name = document.getElementById('filterName').value.trim();
  const status = document.getElementById('filterStatus').value;
  let url = `${SB_URL}/rest/v1/attendance_logs?order=work_date.desc,submitted_at.desc&limit=500`;
  if (COMPANY_ID) url += '&company_id=eq.' + COMPANY_ID;
  if (year && month) url += `&work_date=gte.${year}-${month}-01&work_date=lte.${year}-${month}-31`;
  else if (year) url += `&work_date=gte.${year}-01-01&work_date=lte.${year}-12-31`;
  if (name) url += `&worker_name=ilike.*${encodeURIComponent(name)}*`;
  if (status) url += `&status=eq.${status}`;

  const tbody = document.getElementById('attendanceBody');
  tbody.innerHTML = '<tr><td colspan="13" class="empty-state"><span class="spinner"></span> 読み込み中...</td></tr>';

  try {
    const res = await fetch(url, { headers: H });
    attendanceData = await res.json();
    renderAttendance(attendanceData);
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="13" class="empty-state">読み込みエラー</td></tr>';
  }
}

function renderAttendance(data) {
  const tbody = document.getElementById('attendanceBody');
  // 統計
  const present = data.filter(r => r.status === 'present' || r.status === 'late');
  const absent = data.filter(r => r.status === 'absent');
  const late = data.filter(r => r.status === 'late');
  const uniqueW = new Set(data.map(r => r.worker_name)).size;
  const cost = present.reduce((s, r) => s + (r.daily_rate || 0), 0);
  document.getElementById('stat-count').textContent = present.length;
  document.getElementById('stat-absent').textContent = absent.length;
  document.getElementById('stat-late').textContent = late.length;
  document.getElementById('stat-workers').textContent = uniqueW;
  document.getElementById('stat-cost').textContent = '¥' + cost.toLocaleString();

  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="13" class="empty-state">データがありません</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(r => {
    const isDeleted = !!r.is_deleted;
    const statusBadge = isDeleted ? '<span class="badge" style="background:rgba(148,163,184,0.15);color:#94a3b8;border:1px solid rgba(148,163,184,0.3)">削除済</span>' : ({
      present: '<span class="badge badge-present">出勤</span>',
      absent: '<span class="badge badge-absent">欠勤</span>',
      late: '<span class="badge badge-late">遅刻</span>',
      vacation: '<span class="badge badge-present" style="opacity:0.7">休暇</span>'
    }[r.status] || r.status);
    const photoCell = r.meter_photo_url ? '<img class="photo-thumb" src="' + r.meter_photo_url + '" onclick="showPhoto(\'' + r.id + '\')" alt="メーター">' : '-';
    const submitted = r.submitted_at ? r.submitted_at.substring(0,16).replace('T',' ') : '-';
    const lateInfo = r.late_time ? r.late_time + (r.late_reason ? ' (' + r.late_reason + ')' : '') : '-';
    const absentInfo = r.absent_reason ? r.absent_reason + (r.absent_note ? ' / ' + r.absent_note : '') : '-';
    const rowStyle = isDeleted ? ' style="opacity:0.5;text-decoration:line-through"' : '';
    const editBtn = isDeleted ? '<span style="font-size:0.72rem;color:var(--text-dim)">削除済</span>' : '<button class="btn btn-secondary btn-small" onclick="openEditModal(\'' + r.id + '\')">✏️ 編集</button>';
    return '<tr data-id="' + r.id + '" data-photo="' + (r.meter_photo_url||'') + '"' + rowStyle + '>' +
      '<td>' + (r.work_date||'-') + '</td><td>' + (r.worker_name||'-') + '</td><td>' + (r.company||'-') + '</td>' +
      '<td>' + (r.site_name||'-') + '</td><td class="detail-cell">' + (r.work_content||'-') + '</td>' +
      '<td>' + (r.daily_rate ? '¥'+r.daily_rate.toLocaleString() : '-') + '</td>' +
      '<td>' + (r.work_hours||'-') + (r.work_hours ? 'h' : '') + '</td><td>' + statusBadge + '</td>' +
      '<td>' + lateInfo + '</td><td class="detail-cell">' + absentInfo + '</td><td>' + photoCell + '</td>' +
      '<td style="font-size:0.75rem;color:var(--text-dim)">' + submitted + '</td><td>' + editBtn + '</td></tr>';
  }).join('');
}

function showPhoto(id) {
  const row = document.querySelector(`tr[data-id="${id}"]`);
  if (!row) return;
  const url = row.getAttribute('data-photo');
  if (!url) return;
  document.getElementById('photoModalImg').src = url;
  document.getElementById('photoModal').classList.add('open');
}

function exportCSV() {
  if (!attendanceData.length) return alert('データがありません');
  const year = document.getElementById('filterYear').value;
  const month = document.getElementById('filterMonth').value || 'all';
  const headers = ['作業日','氏名','元請会社','現場名','作業内容','日当','勤務時間','状態','遅刻時刻','遅刻理由','欠勤理由','欠勤備考','送信日時'];
  const rows = attendanceData.map(r => [
    r.work_date||'', r.worker_name||'', r.company||'', r.site_name||'',
    r.work_content||'', r.daily_rate||0, r.work_hours||0, r.status||'',
    r.late_time||'', r.late_reason||'', r.absent_reason||'', r.absent_note||'',
    (r.submitted_at||'').substring(0,16)
  ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8'}));
  a.download = `出勤記録_${year}-${month}.csv`;
  a.click();
}

// ========== 作業員 ==========
let workers = [];
async function loadWorkers() {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/workers?is_active=eq.true&order=name`, { headers: H });
    workers = await res.json();
    renderWorkers();
  } catch(e) {}
}

function renderWorkers() {
  const grid = document.getElementById('workerGrid');
  if (!workers.length) {
    grid.innerHTML = '<div class="empty-state">作業員が登録されていません</div>';
    return;
  }
  grid.innerHTML = workers.map(w => {
    const rates = w.work_rates || {};
    const rateTags = Object.entries(rates).map(([k,v]) =>
      `<span class="rate-tag">${k}: ¥${Number(v).toLocaleString()}</span>`
    ).join('');
    return `<div class="worker-card">
      <div class="worker-name">${w.name}</div>
      <div class="worker-company">${w.company}</div>
      <div class="worker-rate">基本日当: ¥${w.daily_rate.toLocaleString()}</div>
      <div class="rate-tags">${rateTags || '<span class="rate-tag" style="color:var(--text-dim)">工種別単価なし</span>'}</div>
      <div class="worker-actions">
        <button class="btn btn-secondary btn-small" onclick="openWorkerModal('${w.id}')">✏️ 編集</button>
        <button class="btn btn-danger btn-small" onclick="deleteWorker('${w.id}', '${w.name}')">🗑️ 削除</button>
      </div>
    </div>`;
  }).join('');
}

function openWorkerModal(id) {
  editingWorkerId = id;
  const modal = document.getElementById('workerModal');
  const title = document.getElementById('workerModalTitle');
  // Rates行生成
  const ratesRows = document.getElementById('ratesRows');
  const w = id ? workers.find(x => x.id === id) : null;
  const rates = w ? (w.work_rates || {}) : {};
  ratesRows.innerHTML = RATE_KEYS.map(k => `
    <tr>
      <td class="rate-label">${k}</td>
      <td><input type="number" id="rate_${k}" placeholder="未設定" value="${rates[k]||''}" min="0" step="500" style="width:110px"></td>
    </tr>
  `).join('');
  if (w) {
    title.textContent = '作業員を編集';
    document.getElementById('mName').value = w.name;
    document.getElementById('mCompany').value = w.company;
    document.getElementById('mRate').value = w.daily_rate;
  } else {
    title.textContent = '作業員を追加';
    document.getElementById('mName').value = '';
    document.getElementById('mCompany').value = '';
    document.getElementById('mRate').value = '15000';
  }
  modal.classList.add('open');
}

function closeWorkerModal() {
  document.getElementById('workerModal').classList.remove('open');
  editingWorkerId = null;
}

async function saveWorker() {
  const name = document.getElementById('mName').value.trim();
  const company = document.getElementById('mCompany').value.trim();
  const rate = parseInt(document.getElementById('mRate').value) || 15000;
  if (!name || !company) return alert('氏名と会社名は必須です');
  const work_rates = {};
  RATE_KEYS.forEach(k => {
    const v = document.getElementById('rate_'+k).value;
    if (v) work_rates[k] = parseInt(v);
  });
  const payload = { name, company, daily_rate: rate, work_rates, is_active: true };
  try {
    if (editingWorkerId) {
      await fetch(`${SB_URL}/rest/v1/workers?id=eq.${editingWorkerId}`, {
        method: 'PATCH', headers: H, body: JSON.stringify(payload)
      });
    } else {
      await fetch(`${SB_URL}/rest/v1/workers`, {
        method: 'POST', headers: H, body: JSON.stringify(payload)
      });
    }
    closeWorkerModal();
    await loadWorkers();
  } catch(e) { alert('保存に失敗しました'); }
}

async function deleteWorker(id, name) {
  if (!confirm(`${name} を削除しますか？`)) return;
  await fetch(`${SB_URL}/rest/v1/workers?id=eq.${id}`, {
    method: 'PATCH', headers: H,
    body: JSON.stringify({ is_active: false })
  });
  await loadWorkers();
}

// ========== 給与計算 ==========
let salaryData = [];
async function loadSalary() {
  const year = document.getElementById('salaryYear').value;
  const month = document.getElementById('salaryMonth').value;
  const url = `${SB_URL}/rest/v1/attendance_logs?work_date=gte.${year}-${month}-01&work_date=lte.${year}-${month}-31&status=neq.absent&order=worker_name`;
  const tbody = document.getElementById('salaryBody');
  tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><span class="spinner"></span> 集計中...</td></tr>';
  try {
    const res = await fetch(url, { headers: H });
    const logs = await res.json();
    // 作業員別集計
    const map = {};
    logs.forEach(r => {
      if (!map[r.worker_name]) map[r.worker_name] = { name: r.worker_name, days: 0, base: 0, logs: [] };
      map[r.worker_name].days++;
      map[r.worker_name].base += r.daily_rate || 0;
      map[r.worker_name].logs.push(r);
    });
    salaryData = Object.values(map);
    renderSalary(year, month);
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty-state">読み込みエラー</td></tr>';
  }
}

function renderSalary(year, month) {
  const tbody = document.getElementById('salaryBody');
  if (!salaryData.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty-state">該当データがありません</td></tr>';
    return;
  }
  tbody.innerHTML = salaryData.map((s, i) => `
    <tr id="salary-row-${i}">
      <td>${s.name}</td>
      <td>${s.days}日</td>
      <td>¥${s.base.toLocaleString()}</td>
      <td><input type="number" id="transport_${i}" value="0" min="0" step="100" onchange="calcTotal(${i})"></td>
      <td><input type="number" id="allowance_${i}" value="0" min="0" step="100" onchange="calcTotal(${i})"></td>
      <td><input type="number" id="deduct_${i}" value="0" min="0" step="100" onchange="calcTotal(${i})"></td>
      <td class="total-col" id="total_${i}">¥${s.base.toLocaleString()}</td>
      <td><button class="btn btn-secondary btn-small" onclick="openPayslip(${i}, '${year}', '${month}')">📄 明細・PDF</button></td>
    </tr>
  `).join('');
}

function calcTotal(i) {
  const s = salaryData[i];
  const transport = parseInt(document.getElementById(`transport_${i}`).value) || 0;
  const allowance = parseInt(document.getElementById(`allowance_${i}`).value) || 0;
  const deduct = parseInt(document.getElementById(`deduct_${i}`).value) || 0;
  const total = s.base + transport + allowance - deduct;
  document.getElementById(`total_${i}`).textContent = '¥' + total.toLocaleString();
}

function openPayslip(i, year, month) {
  const s = salaryData[i];
  const transport = parseInt(document.getElementById(`transport_${i}`).value) || 0;
  const allowance = parseInt(document.getElementById(`allowance_${i}`).value) || 0;
  const deduct = parseInt(document.getElementById(`deduct_${i}`).value) || 0;
  const total = s.base + transport + allowance - deduct;
  const issued = new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric'});

  const logsTable = s.logs.map(r => `
    <tr>
      <td style="padding:6px 10px; border-bottom:1px solid #eee">${r.work_date}</td>
      <td style="padding:6px 10px; border-bottom:1px solid #eee">${r.site_name||'-'}</td>
      <td style="padding:6px 10px; border-bottom:1px solid #eee">${r.work_content||'-'}${r.status==='late'?' [遅刻]':''}</td>
      <td style="padding:6px 10px; border-bottom:1px solid #eee; text-align:right">¥${(r.daily_rate||0).toLocaleString()}</td>
    </tr>
  `).join('');

  const html = `<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8">
<title>給与明細書 - ${s.name} ${year}年${parseInt(month)}月分</title>
<style>
  body { font-family: 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif; max-width: 700px; margin: 40px auto; color: #1a1a1a; font-size: 14px; }
  @media print { body { margin: 20px; } .no-print { display: none; } }
  h1 { text-align: center; font-size: 1.4rem; border-bottom: 2px solid #1a3828; padding-bottom: 10px; margin-bottom: 6px; }
  .header-info { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 0.85rem; color: #555; }
  .company-logo { font-size: 0.9rem; font-weight: 700; color: #16803e; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
  th { background: #f0f7f0; padding: 8px 10px; text-align: left; font-size: 0.8rem; color: #555; }
  td { padding: 7px 10px; }
  .summary-table td { padding: 8px 10px; border-bottom: 1px solid #eee; }
  .summary-table .label { color: #555; }
  .summary-table .amount { text-align: right; font-weight: 600; }
  .total-row { background: #f0f7f0; font-size: 1.05rem; }
  .total-row td { font-weight: 700; color: #16803e; }
  .issued { text-align: right; font-size: 0.8rem; color: #888; margin-top: 30px; }
  button { background: #22a05a; color: white; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; margin-bottom: 20px; }
</style>
</head><body>
<button class="no-print" onclick="window.print()">🖨️ 印刷する</button>
<div class="company-logo">建設日報システム</div>
<h1>給 与 明 細 書</h1>
<div class="header-info">
  <span>氏名：<strong>${s.name}</strong></span>
  <span>対象期間：<strong>${year}年${parseInt(month)}月分</strong></span>
</div>
<h3 style="font-size:0.85rem; color:#555; margin-bottom:8px">▶ 日別出勤記録</h3>
<table>
  <thead><tr><th>作業日</th><th>現場名</th><th>作業内容</th><th style="text-align:right">日当</th></tr></thead>
  <tbody>${logsTable}</tbody>
</table>
<h3 style="font-size:0.85rem; color:#555; margin-bottom:8px">▶ 支給明細</h3>
<table class="summary-table">
  <tr><td class="label">基本給（${s.days}日分）</td><td class="amount">¥${s.base.toLocaleString()}</td></tr>
  <tr><td class="label">交通費</td><td class="amount">¥${transport.toLocaleString()}</td></tr>
  <tr><td class="label">手当</td><td class="amount">¥${allowance.toLocaleString()}</td></tr>
  <tr><td class="label">控除</td><td class="amount" style="color:#e53e3e">-¥${deduct.toLocaleString()}</td></tr>
  <tr class="total-row"><td>差引支給額</td><td class="amount">¥${total.toLocaleString()}</td></tr>
</table>
<div class="issued">発行日：${issued}</div>
</body></html>`;

  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  setTimeout(() => win.print(), 500);
}
</script>
</body>
</html>

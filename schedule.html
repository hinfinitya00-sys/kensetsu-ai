<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工程表（ガントチャート）｜建設AIシステム</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="auth.js"></script>
  <script>checkAuth();</script>
  <style>
    :root {
      --orange:#FF6B00; --orange-dark:#CC5500; --orange-light:#FF8C33;
      --black:#0A0A0A; --dark:#111418; --card:#181C22; --card2:#1E232B;
      --border:#2A3040; --text:#E8EAF0; --muted:#7A8499;
      --green:#22C55E; --blue:#3B82F6; --yellow:#F59E0B;
      --red:#EF4444; --purple:#A855F7;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{background:var(--black);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}
    a{color:inherit;text-decoration:none;}
    button{font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
    input,select,textarea{font-family:'Noto Sans JP',sans-serif;}

    /* Header */
    header{background:var(--dark);border-bottom:2px solid var(--orange);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
    .logo{display:flex;align-items:center;gap:10px;font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;letter-spacing:1px;}
    .logo-mark{width:32px;height:32px;background:var(--orange);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:white;}
    .header-right{display:flex;align-items:center;gap:10px;}
    .icon-btn{background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--muted);height:36px;border-radius:8px;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0 12px;gap:6px;font-weight:700;}
    .icon-btn:hover{background:rgba(255,107,0,.15);border-color:var(--orange);color:var(--orange);}
    .icon-btn.sq{width:36px;padding:0;}

    /* Container */
    .container{max-width:1400px;margin:0 auto;padding:20px 20px 60px;}
    .page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
    .page-title{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;letter-spacing:1px;}
    .page-title span{color:var(--orange);}
    .page-sub{font-size:13px;color:var(--muted);margin-top:2px;}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
    .btn-orange{background:linear-gradient(135deg,var(--orange),var(--orange-dark));color:#fff;border:none;padding:10px 20px;border-radius:9px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;transition:all .2s;box-shadow:0 4px 12px rgba(255,107,0,.3);}
    .btn-orange:hover{transform:translateY(-1px);}
    .btn-ghost{background:var(--card2);color:var(--text);border:1px solid var(--border);padding:9px 16px;border-radius:9px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;transition:all .2s;}
    .btn-ghost:hover{border-color:var(--orange);color:var(--orange);}

    /* Toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 22px;border-radius:100px;font-size:13px;font-weight:600;color:#fff;background:var(--dark);z-index:500;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4);}
    .toast.show{transform:translateX(-50%) translateY(0);}
    .toast.ok{background:var(--green);}
    .toast.err{background:var(--red);}

    /* Legend */
    .legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
    .legend-dot{width:12px;height:12px;border-radius:3px;}

    /* ─── Gantt Chart ─────────────────────────────────── */
    .gantt-wrap{
      background:var(--card);border:1px solid var(--border);border-radius:12px;
      overflow:hidden;margin-bottom:20px;
    }
    .gantt-inner{
      display:grid;
      grid-template-columns:260px 1fr;
      min-height:200px;
    }
    /* Left panel */
    .gantt-left{
      background:var(--card2);border-right:1px solid var(--border);
      position:sticky;left:0;z-index:10;
    }
    .gantt-left-hd{
      display:grid;grid-template-columns:1fr 50px 50px;
      border-bottom:2px solid var(--orange);
      background:var(--dark);padding:0;
    }
    .gantt-col-hd{
      padding:10px 12px;font-size:11px;font-weight:700;color:var(--muted);
      text-transform:uppercase;letter-spacing:.5px;
    }
    .gantt-rows-left{/* rows rendered by JS */}
    .gantt-task-row-left{
      display:grid;grid-template-columns:1fr 50px 50px;
      border-bottom:1px solid var(--border);min-height:48px;
      align-items:center;transition:background .15s;
    }
    .gantt-task-row-left:hover{background:rgba(255,107,0,.05);}
    .task-name{padding:8px 12px;font-size:13px;font-weight:600;line-height:1.3;}
    .task-name-sub{font-size:11px;color:var(--muted);font-weight:400;}
    .task-prog{text-align:center;font-size:12px;font-weight:700;color:var(--orange);}
    .task-act{text-align:center;}
    .edit-task-btn{background:none;border:none;color:var(--muted);font-size:14px;padding:4px;border-radius:4px;transition:all .15s;}
    .edit-task-btn:hover{color:var(--orange);}

    /* Right timeline */
    .gantt-right{overflow-x:auto;}
    .gantt-timeline{min-width:600px;position:relative;}
    .timeline-hd{
      display:flex;border-bottom:2px solid var(--orange);
      background:var(--dark);position:sticky;top:0;z-index:5;
      height:42px;align-items:flex-end;
    }
    .tl-month{
      position:absolute;top:0;height:20px;
      font-size:11px;font-weight:700;color:var(--orange);
      padding:4px 8px;border-right:1px solid var(--border);
      white-space:nowrap;
    }
    .tl-day{
      flex-shrink:0;height:20px;
      font-size:10px;color:var(--muted);
      text-align:center;border-right:1px solid rgba(42,48,64,.5);
      display:flex;align-items:center;justify-content:center;
    }
    .tl-day.weekend{color:rgba(239,68,68,.6);}
    .gantt-rows-right{position:relative;}
    .gantt-task-row-right{
      border-bottom:1px solid var(--border);
      min-height:48px;position:relative;
      display:flex;align-items:center;
      transition:background .15s;
    }
    .gantt-task-row-right:hover{background:rgba(255,107,0,.03);}
    /* Today line */
    .today-line{
      position:absolute;top:0;bottom:0;width:2px;
      background:rgba(239,68,68,.6);z-index:8;pointer-events:none;
    }
    .today-label{
      position:absolute;top:2px;transform:translateX(-50%);
      font-size:9px;font-weight:700;color:var(--red);
      background:var(--dark);padding:1px 4px;border-radius:3px;white-space:nowrap;
    }
    /* Grid lines */
    .grid-col{
      position:absolute;top:0;bottom:0;width:1px;
      background:rgba(42,48,64,.5);
    }
    .grid-col.weekend{background:rgba(239,68,68,.1);}
    /* Task bar */
    .task-bar{
      position:absolute;height:28px;border-radius:6px;
      display:flex;align-items:center;overflow:hidden;
      box-shadow:0 2px 8px rgba(0,0,0,.25);
      transition:transform .15s,box-shadow .15s;
      cursor:pointer;
    }
    .task-bar:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.4);}
    .task-bar-fill{height:100%;border-radius:6px 0 0 6px;opacity:.7;}
    .task-bar-label{
      position:absolute;left:8px;right:4px;
      font-size:11px;font-weight:700;color:#fff;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      text-shadow:0 1px 4px rgba(0,0,0,.5);
    }
    /* Empty state */
    .gantt-empty{padding:60px 20px;text-align:center;color:var(--muted);}
    .gantt-empty-icon{font-size:48px;margin-bottom:12px;}

    /* ─── Modal ───────────────────────────────────────── */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;padding:20px;overflow-y:auto;align-items:flex-start;justify-content:center;}
    .overlay.open{display:flex;padding-top:40px;}
    .modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;overflow:hidden;}
    .modal-hd{background:var(--card2);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
    .modal-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
    .close-btn{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:8px;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .close-btn:hover{background:rgba(239,68,68,.15);color:var(--red);border-color:var(--red);}
    .modal-body{padding:20px;}
    .fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
    .fg label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
    .fg label .req{color:var(--orange);margin-left:2px;}
    .f-input{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;transition:border-color .2s;width:100%;}
    .f-input:focus{outline:none;border-color:var(--orange);}
    .f-input::placeholder{color:var(--muted);opacity:.6;}
    select.f-input{cursor:pointer;}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .prog-wrap{display:flex;align-items:center;gap:10px;}
    .prog-wrap input[type=range]{flex:1;accent-color:var(--orange);}
    .prog-val{font-weight:700;color:var(--orange);min-width:40px;text-align:right;}
    .modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
    .btn-modal-save{background:var(--orange);color:#fff;border:none;padding:10px 24px;border-radius:9px;font-size:14px;font-weight:700;transition:all .2s;}
    .btn-modal-save:hover{background:var(--orange-dark);}
    .btn-modal-del{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25);padding:10px 16px;border-radius:9px;font-size:14px;font-weight:700;transition:all .2s;}
    .btn-modal-del:hover{background:rgba(239,68,68,.25);}
    .btn-modal-cancel{background:var(--card2);color:var(--muted);border:1px solid var(--border);padding:10px 16px;border-radius:9px;font-size:13px;font-weight:700;}

    /* ─── Print ────────────────────────────────────────── */
    @media print{
      body>*:not(.container){display:none!important;}
      .toolbar,.icon-btn,.btn-orange,.btn-ghost,.edit-task-btn{display:none!important;}
      header{position:relative!important;}
      .gantt-right{overflow-x:visible!important;}
      .gantt-timeline{min-width:unset!important;}
      body{background:#fff!important;color:#000!important;}
      .gantt-wrap{border:1pt solid #ccc!important;background:#fff!important;}
      .gantt-inner{background:#fff!important;}
      .gantt-left,.gantt-left-hd,.gantt-col-hd{background:#f5f5f5!important;color:#333!important;}
      .task-name{color:#000!important;}
      .tl-day{color:#666!important;}
      .timeline-hd,.gantt-left-hd{background:#f0f0f0!important;}
    }
    @media(max-width:768px){
      .gantt-inner{grid-template-columns:180px 1fr;}
      .gantt-left-hd{grid-template-columns:1fr 40px 36px;}
      .gantt-task-row-left{grid-template-columns:1fr 40px 36px;}
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">建</div>
    <span>KENSETSU<span style="color:var(--orange)">AI</span></span>
  </div>
  <div class="header-right">
    <a href="admin.html" class="icon-btn sq" title="ダッシュボードへ戻る">🏠</a>
  </div>
</header>

<div class="container">

  <div class="page-header">
    <div>
      <div class="page-title">工程表 <span>ガントチャート</span></div>
      <div class="page-sub">工種・開始日・終了日・進捗率を管理 ― Supabase連携・印刷対応</div>
    </div>
    <div class="toolbar">
      <button class="btn-orange" id="addTaskBtn">＋ 工程を追加</button>
      <button class="btn-ghost" id="syncBtn">🔄 Supabase同期</button>
      <button class="btn-ghost" onclick="window.print()">🖨️ 印刷</button>
    </div>
  </div>

  <!-- View range controls -->
  <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;">
    <span style="font-size:12px;font-weight:700;color:var(--muted);">表示期間</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <input type="date" id="viewStart" class="f-input" style="width:150px;padding:7px 10px;font-size:13px;">
      <span style="color:var(--muted);">〜</span>
      <input type="date" id="viewEnd" class="f-input" style="width:150px;padding:7px 10px;font-size:13px;">
      <button class="btn-ghost" id="applyRangeBtn" style="padding:7px 14px;">適用</button>
    </div>
    <button class="btn-ghost" id="fitRangeBtn" style="padding:7px 14px;">自動調整</button>
  </div>

  <!-- Legend -->
  <div class="legend" id="legendArea"></div>

  <!-- Gantt -->
  <div class="gantt-wrap" id="ganttWrap">
    <div class="gantt-inner" id="ganttInner">
      <!-- JS で生成 -->
    </div>
  </div>

</div>

<!-- Task Modal -->
<div class="overlay" id="taskModal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="modalTitle">📋 工程を追加</div>
      <button class="close-btn" id="closeModal">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg"><label>作業名<span class="req">*</span></label>
        <input type="text" id="m-name" class="f-input" placeholder="法枠コンクリート打設"></div>
      <div class="row2">
        <div class="fg"><label>工種</label>
          <select id="m-type" class="f-input">
            <option value="法面工事">法面工事</option>
            <option value="土木工事">土木工事</option>
            <option value="排水工">排水工</option>
            <option value="舗装工">舗装工</option>
            <option value="仮設工">仮設工</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="fg"><label>担当者</label>
          <input type="text" id="m-person" class="f-input" placeholder="山田"></div>
      </div>
      <div class="row2">
        <div class="fg"><label>開始日<span class="req">*</span></label>
          <input type="date" id="m-start" class="f-input"></div>
        <div class="fg"><label>終了日<span class="req">*</span></label>
          <input type="date" id="m-end" class="f-input"></div>
      </div>
      <div class="fg"><label>進捗率</label>
        <div class="prog-wrap">
          <input type="range" id="m-prog" min="0" max="100" value="0" oninput="$('m-prog-val').textContent=this.value+'%'">
          <span class="prog-val" id="m-prog-val">0%</span>
        </div>
      </div>
      <div class="fg"><label>メモ</label>
        <textarea id="m-memo" class="f-input" rows="2" placeholder="備考・注意事項など"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-modal-del" id="deleteTaskBtn" style="display:none;">🗑 削除</button>
      <button class="btn-modal-cancel" id="cancelModal">キャンセル</button>
      <button class="btn-modal-save" id="saveTaskBtn">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
const $ = id => document.getElementById(id);
let _tt;
function toast(msg,type='',dur=3000){const t=$('toast');t.textContent=msg;t.className='toast show'+(type?' '+type:'');clearTimeout(_tt);_tt=setTimeout(()=>{t.className='toast';},dur);}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Color map ────────────────────────────────────────────
const TYPE_COLOR = {
  '法面工事': '#FF6B00',
  '土木工事': '#3B82F6',
  '排水工':   '#A855F7',
  '舗装工':   '#22C55E',
  '仮設工':   '#F59E0B',
  'その他':   '#7A8499',
};
function getColor(type){ return TYPE_COLOR[type] || '#7A8499'; }

// ── LocalStorage ─────────────────────────────────────────
const LS_KEY = 'schedule_items';
let tasks = [];
let editingId = null;

function loadTasks(){
  try{ tasks = JSON.parse(localStorage.getItem(LS_KEY)||'[]'); }catch(e){ tasks=[]; }
}
function saveTasks(){ localStorage.setItem(LS_KEY, JSON.stringify(tasks)); }
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// ── Date utils ───────────────────────────────────────────
function parseDate(s){ return s ? new Date(s+'T00:00:00') : null; }
function dateToStr(d){ return d.toISOString().slice(0,10); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function diffDays(a,b){ return Math.round((b-a)/(1000*60*60*24)); }
function isWeekend(d){ const w=d.getDay(); return w===0||w===6; }
function fmtDateJP(d){ return `${d.getMonth()+1}/${d.getDate()}`; }
function fmtMonth(d){ return `${d.getFullYear()}年${d.getMonth()+1}月`; }

// ── View range ───────────────────────────────────────────
let viewStart, viewEnd;

function calcAutoRange(){
  if(tasks.length===0){
    const t=new Date();
    viewStart=addDays(t,-7);
    viewEnd=addDays(t,30);
  } else {
    const starts=tasks.map(t=>parseDate(t.start_date)).filter(Boolean);
    const ends  =tasks.map(t=>parseDate(t.end_date)).filter(Boolean);
    viewStart=addDays(new Date(Math.min(...starts)),-3);
    viewEnd  =addDays(new Date(Math.max(...ends)),3);
  }
  $('viewStart').value=dateToStr(viewStart);
  $('viewEnd').value=dateToStr(viewEnd);
}

function applyRange(){
  viewStart=parseDate($('viewStart').value)||viewStart;
  viewEnd  =parseDate($('viewEnd').value)||viewEnd;
  if(viewEnd<=viewStart) viewEnd=addDays(viewStart,30);
  renderGantt();
}

$('applyRangeBtn').addEventListener('click', applyRange);
$('fitRangeBtn').addEventListener('click',()=>{ calcAutoRange(); renderGantt(); });

// ── Render Gantt ─────────────────────────────────────────
const DAY_W = 28; // px per day

function renderGantt(){
  const inner = $('ganttInner');
  const totalDays = Math.max(diffDays(viewStart, viewEnd), 1);
  const totalW = totalDays * DAY_W;

  if(tasks.length === 0){
    inner.innerHTML = `<div class="gantt-empty" style="grid-column:span 2;">
      <div class="gantt-empty-icon">📋</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:8px;">工程がまだ登録されていません</div>
      <div style="font-size:13px;color:var(--muted);">「＋ 工程を追加」ボタンで工程を追加してください</div>
    </div>`;
    renderLegend();
    return;
  }

  // ── Left panel ───────────────────────────────────────
  const leftHd = `<div class="gantt-left-hd">
    <div class="gantt-col-hd">作業名 / 工種</div>
    <div class="gantt-col-hd" style="text-align:center;">進捗</div>
    <div class="gantt-col-hd"></div>
  </div>`;

  const leftRows = tasks.map((task,i) => {
    const color = getColor(task.work_type);
    const prog  = task.progress || 0;
    return `<div class="gantt-task-row-left">
      <div class="task-name">
        <div>${escHtml(task.name)}</div>
        <div class="task-name-sub" style="color:${color};">${escHtml(task.work_type||'')}${task.person?' · '+escHtml(task.person):''}</div>
      </div>
      <div class="task-prog">${prog}%</div>
      <div class="task-act"><button class="edit-task-btn" onclick="openEditModal('${task.id}')">✏️</button></div>
    </div>`;
  }).join('');

  const leftHtml = `<div class="gantt-left">
    ${leftHd}
    <div class="gantt-rows-left">${leftRows}</div>
  </div>`;

  // ── Timeline header ──────────────────────────────────
  let dayHeaders = '';
  let monthHeaders = '';
  const months = {};

  for(let i=0; i<totalDays; i++){
    const d = addDays(viewStart, i);
    const isWe = isWeekend(d);
    const isToday = dateToStr(d) === dateToStr(new Date());
    dayHeaders += `<div class="tl-day${isWe?' weekend':''}" style="width:${DAY_W}px;${isToday?'background:rgba(239,68,68,.1);':''}">
      <span style="${isToday?'color:var(--red);font-weight:700;':''}">${d.getDate()}</span>
    </div>`;
    const mk = `${d.getFullYear()}-${d.getMonth()}`;
    if(!months[mk]) months[mk] = { label: fmtMonth(d), left: i*DAY_W };
  }

  // Month labels (positioned absolutely)
  Object.entries(months).forEach(([,m])=>{
    monthHeaders += `<div class="tl-month" style="left:${m.left}px;">${m.label}</div>`;
  });

  // ── Grid lines & today marker ────────────────────────
  let gridLines = '';
  let todayLine = '';
  for(let i=0; i<totalDays; i++){
    const d=addDays(viewStart,i);
    const isWe=isWeekend(d);
    gridLines += `<div class="grid-col${isWe?' weekend':''}" style="left:${i*DAY_W}px;"></div>`;
    if(dateToStr(d)===dateToStr(new Date())){
      todayLine=`<div class="today-line" style="left:${i*DAY_W}px;">
        <div class="today-label">今日</div></div>`;
    }
  }

  // ── Task bars ────────────────────────────────────────
  const taskRows = tasks.map(task => {
    const s = parseDate(task.start_date);
    const e = parseDate(task.end_date);
    if(!s||!e) return `<div class="gantt-task-row-right" style="width:${totalW}px;">${gridLines}</div>`;

    const left  = Math.max(diffDays(viewStart,s),0)*DAY_W;
    const clampS= s<viewStart?viewStart:s;
    const clampE= e>viewEnd?viewEnd:e;
    const w     = Math.max(diffDays(clampS,clampE)+1,1)*DAY_W;
    const prog  = task.progress||0;
    const color = getColor(task.work_type);
    const fillW = Math.round(w * prog/100);

    return `<div class="gantt-task-row-right" style="width:${totalW}px;">
      ${gridLines}
      <div class="task-bar" style="left:${left}px;width:${w}px;background:${color}22;border:1px solid ${color}66;"
        onclick="openEditModal('${task.id}')" title="${escHtml(task.name)} (${prog}%)">
        <div class="task-bar-fill" style="width:${fillW}px;background:${color};"></div>
        <div class="task-bar-label">${escHtml(task.name)}</div>
      </div>
    </div>`;
  }).join('');

  const rightHtml = `<div class="gantt-right">
    <div class="gantt-timeline" style="width:${totalW}px;">
      <div class="timeline-hd" style="position:relative;height:42px;">
        ${monthHeaders}
        <div style="display:flex;position:absolute;bottom:0;left:0;">${dayHeaders}</div>
      </div>
      <div class="gantt-rows-right" style="position:relative;">
        ${todayLine}
        ${taskRows}
      </div>
    </div>
  </div>`;

  inner.innerHTML = leftHtml + rightHtml;
  renderLegend();
}

// ── Legend ────────────────────────────────────────────────
function renderLegend(){
  $('legendArea').innerHTML = Object.entries(TYPE_COLOR).map(([label,color])=>
    `<div class="legend-item"><div class="legend-dot" style="background:${color};"></div><span>${label}</span></div>`
  ).join('');
}

// ── Modal ────────────────────────────────────────────────
function openAddModal(){
  editingId = null;
  $('modalTitle').textContent='📋 工程を追加';
  $('m-name').value='';
  $('m-type').value='法面工事';
  $('m-person').value='';
  const today=dateToStr(new Date());
  $('m-start').value=today;
  $('m-end').value=dateToStr(addDays(new Date(),14));
  $('m-prog').value=0; $('m-prog-val').textContent='0%';
  $('m-memo').value='';
  $('deleteTaskBtn').style.display='none';
  $('taskModal').classList.add('open');
  setTimeout(()=>$('m-name').focus(),100);
}

function openEditModal(id){
  const task=tasks.find(t=>t.id===id);
  if(!task) return;
  editingId=id;
  $('modalTitle').textContent='✏️ 工程を編集';
  $('m-name').value=task.name||'';
  $('m-type').value=task.work_type||'法面工事';
  $('m-person').value=task.person||'';
  $('m-start').value=task.start_date||'';
  $('m-end').value=task.end_date||'';
  $('m-prog').value=task.progress||0;
  $('m-prog-val').textContent=(task.progress||0)+'%';
  $('m-memo').value=task.memo||'';
  $('deleteTaskBtn').style.display='flex';
  $('taskModal').classList.add('open');
}

function closeModal(){ $('taskModal').classList.remove('open'); editingId=null; }

$('addTaskBtn').addEventListener('click', openAddModal);
$('closeModal').addEventListener('click', closeModal);
$('cancelModal').addEventListener('click', closeModal);
$('taskModal').addEventListener('click', e=>{ if(e.target===$('taskModal')) closeModal(); });

$('saveTaskBtn').addEventListener('click',()=>{
  const name=$('m-name').value.trim();
  if(!name){ toast('作業名を入力してください','err'); return; }
  const start=$('m-start').value;
  const end  =$('m-end').value;
  if(!start||!end){ toast('開始日・終了日を入力してください','err'); return; }
  if(end<start){ toast('終了日は開始日以降にしてください','err'); return; }

  const data={
    id: editingId||genId(),
    name, work_type:$('m-type').value,
    person:$('m-person').value.trim(),
    start_date:start, end_date:end,
    progress:parseInt($('m-prog').value)||0,
    memo:$('m-memo').value.trim(),
  };

  if(editingId){
    const idx=tasks.findIndex(t=>t.id===editingId);
    if(idx>=0) tasks[idx]=data;
    toast('工程を更新しました','ok');
  } else {
    tasks.push(data);
    toast('工程を追加しました','ok');
  }
  saveTasks(); closeModal(); renderGantt();
});

$('deleteTaskBtn').addEventListener('click',()=>{
  if(!editingId) return;
  if(!confirm('この工程を削除しますか？')) return;
  tasks=tasks.filter(t=>t.id!==editingId);
  saveTasks(); closeModal(); renderGantt();
  toast('削除しました');
});

// ── Supabase sync ─────────────────────────────────────────
$('syncBtn').addEventListener('click', async ()=>{
  const url=localStorage.getItem('dr_sb_url');
  const key=localStorage.getItem('dr_sb_key');
  if(!url||!key){ toast('Supabase設定が未入力です（管理画面⚙️から設定）','err'); return; }
  $('syncBtn').textContent='⏳ 同期中...';
  try{
    const r=await fetch(`${url}/rest/v1/projects?select=id,name,work_type,status&order=created_at.desc&limit=50`,{
      headers:{'apikey':key,'Authorization':'Bearer '+key},
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const projects=await r.json();
    let added=0;
    projects.forEach(p=>{
      if(p.status==='進行中' && !tasks.find(t=>t.project_id===p.id)){
        const today=new Date();
        tasks.push({
          id:genId(), project_id:p.id,
          name:p.name||'（未設定）',
          work_type:p.work_type||'その他',
          person:'', start_date:dateToStr(today),
          end_date:dateToStr(addDays(today,30)),
          progress:0, memo:'Supabaseから自動取得',
        });
        added++;
      }
    });
    if(added>0){ saveTasks(); calcAutoRange(); renderGantt(); toast(`${added}件の工程を取得しました`,'ok'); }
    else toast('新規工程はありませんでした');
  }catch(e){
    toast('同期エラー: '+e.message,'err');
  }
  $('syncBtn').textContent='🔄 Supabase同期';
});

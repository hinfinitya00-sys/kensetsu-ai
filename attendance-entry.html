<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出面送信｜建設AI現場管理システム</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange:       #FF6B00;
      --orange-dark:  #CC5500;
      --black:        #0A0A0A;
      --dark:         #111418;
      --card:         #181C22;
      --card2:        #1E232B;
      --border:       #2A3040;
      --text:         #E8EAF0;
      --muted:        #7A8499;
      --green:        #22C55E;
      --blue:         #3B82F6;
      --yellow:       #F59E0B;
      --red:          #EF4444;
      --purple:       #A855F7;
      --radius:       14px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      background:var(--black);
      color:var(--text);
      font-family:'Noto Sans JP',sans-serif;
      min-height:100vh;
      overflow-x:hidden;
    }
    a { color:inherit; text-decoration:none; }
    button { font-family:'Noto Sans JP',sans-serif; cursor:pointer; }

    header {
      background:var(--dark);
      border-bottom:2px solid var(--orange);
      padding:0 16px;
      height:60px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:sticky;
      top:0;
      z-index:100;
    }
    .logo {
      display:flex; align-items:center; gap:10px;
      font-family:'Oswald',sans-serif; font-size:18px; font-weight:700;
      letter-spacing:1px; color:var(--text);
    }
    .logo-mark {
      width:32px; height:32px; background:var(--orange);
      clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      display:flex; align-items:center; justify-content:center;
      font-size:14px; font-weight:900; color:white;
    }
    .header-right { display:flex; align-items:center; gap:10px; }
    .header-company { font-size:13px; color:var(--muted); }
    .badge-demo { background:var(--orange); color:#fff; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; letter-spacing:1px; }

    .icon-btn {
      background:rgba(255,255,255,.08);
      border:1px solid var(--border);
      color:var(--muted);
      width:36px; height:36px; border-radius:8px;
      font-size:18px;
      display:flex; align-items:center; justify-content:center;
      transition:all .2s;
    }
    .icon-btn:hover { background:rgba(255,107,0,.15); border-color:var(--orange); color:var(--orange); }

    .container { max-width:820px; margin:0 auto; padding:16px; padding-bottom:40px; }

    .info-banner {
      display:none;
      border-radius:10px;
      padding:12px 16px;
      align-items:center;
      gap:12px;
      margin:16px 0;
      font-size:13px;
      animation:fadeUp .35s ease both;
    }
    .info-banner.show { display:flex; }
    .banner-demo { background:rgba(255,107,0,.1); border:1px solid rgba(255,107,0,.3); }
    .banner-rls  { background:rgba(245,158,11,.08); border:1px solid rgba(245,158,11,.25); color:var(--yellow); }
    .banner-ok   { background:rgba(34,197,94,.08); border:1px solid rgba(34,197,94,.25); color:var(--green); }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .page-header { margin:18px 0 12px; }
    .page-title { font-family:'Oswald',sans-serif; font-size:26px; font-weight:700; letter-spacing:1px; margin-bottom:4px; }
    .page-title span { color:var(--orange); }
    .page-sub { font-size:13px; color:var(--muted); }

    .card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      margin-top:14px;
    }
    .card-header {
      padding:14px 16px;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .card-title { font-size:14px; font-weight:900; letter-spacing:.5px; display:flex; align-items:center; gap:8px; }
    .dot { width:8px; height:8px; background:var(--orange); border-radius:50%; }
    .card-body { padding:16px; }

    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width:720px) { .grid-2 { grid-template-columns:1fr; } }

    label { display:block; font-size:12px; font-weight:900; color:var(--muted); margin-bottom:6px; letter-spacing:.4px; }
    .required { color:var(--red); margin-left:4px; }

    input[type="text"], input[type="date"], select, textarea {
      width:100%;
      background:var(--card2);
      border:1px solid var(--border);
      color:var(--text);
      padding:12px 12px;
      border-radius:10px;
      font-size:14px;
      outline:none;
      transition:border-color .2s;
      font-family:'Noto Sans JP',sans-serif;
    }
    textarea { min-height:96px; resize:vertical; }
    input[type="text"]:focus, input[type="date"]:focus, select:focus, textarea:focus {
      border-color:var(--orange);
    }

    .hours-grid {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
    }
    @media (max-width:520px) { .hours-grid { grid-template-columns:repeat(3,1fr); } }
    .hour-btn {
      border:1px solid var(--border);
      background:var(--card2);
      color:var(--muted);
      padding:10px 8px;
      border-radius:12px;
      font-weight:900;
      font-size:13px;
      transition:all .15s;
      text-align:center;
      user-select:none;
    }
    .hour-btn.sel {
      background:rgba(255,107,0,.12);
      border-color:rgba(255,107,0,.45);
      color:var(--orange);
    }

    .upload-area {
      border:2px dashed var(--border);
      border-radius:12px;
      padding:14px;
      background:rgba(255,255,255,.02);
      position:relative;
    }
    .upload-area input[type="file"] {
      position:absolute; inset:0;
      opacity:0; cursor:pointer;
    }
    .upload-area .upload-hint { color:var(--muted); font-size:13px; font-weight:700; }
    .photo-preview {
      margin-top:12px;
      border:1px solid var(--border);
      background:var(--card2);
      border-radius:12px;
      overflow:hidden;
      display:none;
    }
    .photo-preview.show { display:block; }
    .photo-preview img { display:block; width:100%; max-height:220px; object-fit:contain; background:#000; }
    .photo-preview .remove-btn {
      width:100%;
      border:none;
      background:rgba(239,68,68,.12);
      color:var(--red);
      padding:10px 12px;
      font-weight:900;
      cursor:pointer;
      border-top:1px solid var(--border);
    }

    .btn {
      border:none;
      border-radius:12px;
      padding:12px 14px;
      font-weight:900;
      font-size:14px;
      transition:all .15s;
    }
    .btn-primary {
      background:linear-gradient(135deg,var(--orange),var(--orange-dark));
      color:#fff;
      box-shadow:0 8px 24px rgba(255,107,0,.18);
    }
    .btn-primary:hover { transform:translateY(-1px); box-shadow:0 10px 30px rgba(255,107,0,.25); }
    .btn-secondary {
      background:var(--card2);
      border:1px solid var(--border);
      color:var(--muted);
    }
    .btn-wide { width:100%; }
    .btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }

    .toast {
      position:fixed;
      bottom:24px;
      left:50%;
      transform:translateX(-50%) translateY(80px);
      padding:10px 22px;
      border-radius:100px;
      font-size:13px;
      font-weight:900;
      color:#fff;
      background:var(--dark);
      z-index:400;
      transition:transform .3s cubic-bezier(.34,1.56,.64,1);
      white-space:nowrap;
      box-shadow:0 4px 20px rgba(0,0,0,.4);
    }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .toast.ok { background:var(--green); }
    .toast.err { background:var(--red); }

    .overlay {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.7);
      z-index:500;
      padding:20px;
      overflow:auto;
      align-items:flex-start;
      justify-content:center;
    }
    .overlay.open { display:flex; }
    .modal {
      width:100%;
      max-width:520px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      overflow:hidden;
    }
    .modal-hd {
      background:var(--card2);
      padding:14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:1px solid var(--border);
      gap:10px;
    }
    .modal-title { font-size:14px; font-weight:900; display:flex; align-items:center; gap:8px; }
    .close-btn {
      background:rgba(255,255,255,.06);
      border:1px solid var(--border);
      color:var(--muted);
      width:36px; height:36px;
      border-radius:10px;
      font-size:16px;
      display:flex; align-items:center; justify-content:center;
    }
    .close-btn:hover { background:rgba(239,68,68,.15); color:var(--red); border-color:var(--red); }
    .modal-body { padding:16px; }

    .success-screen { display:none; }
    .success-screen.show { display:block; }
    .success-icon { font-size:44px; line-height:1; margin-bottom:10px; }
    .success-title { font-size:20px; font-weight:900; margin-bottom:10px; color:var(--orange); font-family:'Oswald',sans-serif; }
    .success-detail { border:1px solid var(--border); background:var(--card2); border-radius:14px; padding:14px; }
    .success-detail .row {
      display:flex; justify-content:space-between; gap:12px;
      padding:6px 0;
      border-bottom:1px solid rgba(42,48,64,.7);
      font-size:13px;
    }
    .success-detail .row:last-child { border-bottom:none; }
    .success-detail .k { color:var(--muted); font-weight:800; }
    .success-detail .v { font-weight:900; }

    @media (max-width:520px) {
      header { padding:0 12px; }
      .container { padding:12px; padding-bottom:36px; }
      .page-title { font-size:24px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-mark">建</div>
      <span>出面<span style="color:var(--orange)">送信</span></span>
    </div>
    <div class="header-right">
      <span id="modeBadge" class="badge-demo" style="display:none;">DEMO</span>
      <button class="icon-btn" id="settingsBtn" title="設定">⚙️</button>
    </div>
  </header>

  <div class="container">
    <div class="info-banner banner-demo" id="demoBanner">
      <span>🎭</span>
      <div><strong style="color:var(--orange)">デモモード</strong> — Supabase未設定のためサンプル/ローカル保存で動作します。</div>
    </div>
    <div class="info-banner banner-rls" id="rlsBanner">
      <span>⚠️</span>
      <div>Supabaseに接続できましたが、RLS未設定のため登録に失敗する可能性があります。</div>
    </div>

    <div class="page-header">
      <div class="page-title">出面<span>送信</span></div>
      <div class="page-sub">本日の出面を送信してください</div>
    </div>

    <div class="card" id="mainCard">
      <div class="card-body">
        <div style="display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:14px;">
          <div style="flex:1; min-width:200px;">
            <label>日付<span class="required">*</span></label>
            <input type="date" id="workDate">
          </div>
          <div style="flex:1; min-width:200px;">
            <label>出面ステータス<span class="required">*</span></label>
            <select id="attStatus">
              <option value="present">出勤</option>
              <option value="vacation">休暇</option>
              <option value="late">遅刻</option>
              <option value="early_leave">早退</option>
              <option value="absent">欠勤</option>
              <option value="direct_in">直行</option>
              <option value="direct_out">直帰</option>
            </select>
          </div>
        </div>

        <div style="margin-bottom:14px;">
          <label>作業時間 (H)<span class="required">*</span></label>
          <div class="hours-grid" id="hoursGrid"></div>
          <input type="hidden" id="workHoursVal" value="8">
        </div>

        <div class="grid-2" style="margin-bottom:14px;">
          <div>
            <label>名前<span class="required">*</span></label>
            <input type="text" id="employeeName" list="nameList" placeholder="例: 山田 太郎">
            <datalist id="nameList"></datalist>
          </div>
          <div>
            <label>元請け会社名<span class="required">*</span></label>
            <input type="text" id="primeContractor" list="companyList" placeholder="例: ○○建設株式会社">
            <datalist id="companyList"></datalist>
          </div>
          <div style="grid-column:1 / -1;">
            <label>現場名<span class="required">*</span></label>
            <input type="text" id="siteName" list="siteList" placeholder="例: R6-法面崩壊防止工事 福岡082">
            <datalist id="siteList"></datalist>
          </div>
        </div>

        <div style="margin-bottom:14px;">
          <label>作業内容<span class="required">*</span></label>
          <textarea id="workDetail" placeholder="例: 法面整形作業、掘削補助など"></textarea>
        </div>

        <div style="margin-bottom:14px;">
          <label>会社の車のメータ数画像（任意）</label>
          <div class="upload-area" id="meterUploadArea">
            <input type="file" id="meterImageFile" accept="image/*" capture="environment">
            <div class="upload-hint">ここをタップして画像を選択 / 撮影</div>
          </div>
          <div class="photo-preview" id="photoPreview">
            <img id="photoPreviewImg" src="" alt="メータ画像プレビュー">
            <button class="remove-btn" type="button" id="removePhotoBtn">画像を削除</button>
          </div>
        </div>

        <div style="margin-bottom:14px;">
          <label>備考（任意）</label>
          <textarea id="notes" placeholder="例: 体調不良のため早退 / 遅れ理由 / 休暇理由など"></textarea>
        </div>

        <div>
          <button class="btn btn-primary btn-wide" id="submitBtn" type="button">📤 送信する</button>
        </div>
      </div>
    </div>

    <div class="success-screen" id="successScreen">
      <div class="success-icon">✅</div>
      <div class="success-title" id="successTitle">送信しました</div>
      <div class="success-detail" id="successDetail"></div>
      <div style="margin-top:14px;">
        <button class="btn btn-secondary btn-wide" type="button" id="resetBtn">🔄 別の出面を送信</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Settings Modal -->
  <div class="overlay" id="settingsModal">
    <div class="modal">
      <div class="modal-hd">
        <div class="modal-title">⚙️ Supabase接続設定</div>
        <button class="close-btn" id="closeSettingsModal" type="button">✕</button>
      </div>
      <div class="modal-body">
        <div style="margin-bottom:12px; padding:12px; border:1px solid rgba(245,158,11,.25); background:rgba(245,158,11,.06); border-radius:12px; color:var(--yellow); font-size:13px; line-height:1.7;">
          Supabase URL / Anon Key（または Service Role Key）を入力してください。
          <div style="margin-top:6px; color:var(--muted); font-weight:800; font-size:12px;">※ アクセスにはRLSポリシーが必要になる場合があります。</div>
        </div>

        <label>Supabase URL</label>
        <input type="text" id="cfgUrl" placeholder="https://xxxxxxxx.supabase.co" style="margin-bottom:12px;">

        <label>Supabase Anon Key（または Service Role Key）</label>
        <input type="password" id="cfgKey" placeholder="eyJhbGciOi..." style="margin-bottom:16px;">

        <button class="btn btn-primary btn-wide" id="saveSettingsBtn" type="button">保存して反映</button>
      </div>
    </div>
  </div>

  <script>
    // ── Util ────────────────────────────────────────────────
    const $ = (id) => document.getElementById(id);
    let _tt;
    function toast(msg, type='', dur=3200) {
      const t = $('toast');
      t.textContent = msg;
      t.className = 'toast show' + (type ? ' ' + type : '');
      clearTimeout(_tt);
      _tt = setTimeout(() => { t.className = 'toast'; }, dur);
    }

    // ── Settings ───────────────────────────────────────────
    const SK = { url:'dr_sb_url', key:'dr_sb_key' };
    const getCfg = () => ({
      url: localStorage.getItem(SK.url) || '',
      key: localStorage.getItem(SK.key) || ''
    });

    function openSettings() {
      const c = getCfg();
      $('cfgUrl').value = c.url;
      $('cfgKey').value = c.key;
      $('settingsModal').classList.add('open');
    }
    function closeSettings() { $('settingsModal').classList.remove('open'); }
    $('settingsBtn').addEventListener('click', openSettings);
    $('closeSettingsModal').addEventListener('click', closeSettings);
    $('settingsModal').addEventListener('click', (e) => { if (e.target === $('settingsModal')) closeSettings(); });
    $('saveSettingsBtn').addEventListener('click', () => {
      const url = $('cfgUrl').value.trim();
      const key = $('cfgKey').value.trim();
      localStorage.setItem(SK.url, url);
      localStorage.setItem(SK.key, key);
      toast('設定を保存しました。再読み込みします...','ok');
      closeSettings();
      setTimeout(() => location.reload(), 900);
    });

    // ── Demo Attendance Seed ───────────────────────────────
    const today = new Date().toISOString().slice(0,10);
    const DEMO_ATTENDANCE_ENTRIES = (() => {
      const now = Date.now();
      const agoIso = (minsAgo) => new Date(now - minsAgo * 60000).toISOString();
      return [
        {
          id: 'a_demo_1',
          work_date: today,
          worker_name: '山田 太郎',
          status: 'present',
          work_hours: 8,
          company: '○○建設株式会社',
          site_name: '福岡082 法面整備 現場',
          work_content: '法面整形・法枠コンクリート打設',
          meter_photo_url: null,
          meter_photo_path: null,
          notes: null,
          submitted_at: agoIso(120),
          late_time: null,
          late_reason: null,
          absent_reason: null,
          absent_note: null,
        },
        {
          id: 'a_demo_2',
          work_date: today,
          worker_name: '佐藤 健',
          status: 'late',
          work_hours: 6,
          company: '○○建設株式会社',
          site_name: '宮崎区間C 路盤整備 現場',
          work_content: '路盤工・転圧作業',
          meter_photo_url: null,
          meter_photo_path: null,
          notes: null,
          submitted_at: agoIso(80),
          late_time: null,
          late_reason: null,
          absent_reason: null,
          absent_note: null,
        },
        {
          id: 'a_demo_3',
          work_date: today,
          worker_name: '鈴木 一郎',
          status: 'vacation',
          work_hours: 0,
          company: '○○建設株式会社',
          site_name: '福岡082 法面整備 現場',
          work_content: '休暇（現場対応なし）',
          meter_photo_url: null,
          meter_photo_path: null,
          notes: '有給休暇',
          submitted_at: agoIso(40),
          late_time: null,
          late_reason: null,
          absent_reason: '休暇',
          absent_note: '有給休暇',
        },
      ];
    })();

    const DEMO_STORAGE_KEY = 'demo_attendance_entries_v1';
    function ensureDemoSeed() {
      const raw = localStorage.getItem(DEMO_STORAGE_KEY);
      if (!raw) {
        localStorage.setItem(DEMO_STORAGE_KEY, JSON.stringify(DEMO_ATTENDANCE_ENTRIES));
      }
    }

    function getDemoEntries() {
      ensureDemoSeed();
      try { return JSON.parse(localStorage.getItem(DEMO_STORAGE_KEY) || '[]'); } catch { return []; }
    }

    // ── Supabase REST Helpers ──────────────────────────────
    async function sbFetch(path) {
      const { url, key } = getCfg();
      if (!url || !key) throw new Error('Supabase未設定');
      const r = await fetch(`${url}/rest/v1/${path}`, {
        headers: { apikey: key, Authorization: 'Bearer ' + key, 'Content-Type': 'application/json' }
      });
      if (!r.ok) {
        const e = await r.json().catch(() => ({}));
        throw new Error(e.message || e.error || `HTTP ${r.status}`);
      }
      return r.json();
    }

    async function sbPost(path, body, prefer='return=representation') {
      const { url, key } = getCfg();
      const r = await fetch(`${url}/rest/v1/${path}`, {
        method: 'POST',
        headers: {
          apikey: key,
          Authorization: 'Bearer ' + key,
          'Content-Type': 'application/json',
          'Prefer': prefer
        },
        body: JSON.stringify(body)
      });
      if (!r.ok) {
        const e = await r.json().catch(() => ({}));
        throw new Error(e.message || e.error || `HTTP ${r.status}`);
      }
      const txt = await r.text();
      if (!txt) return [];
      return JSON.parse(txt);
    }

    async function sbPatch(path, body, prefer='return=representation') {
      const { url, key } = getCfg();
      const r = await fetch(`${url}/rest/v1/${path}`, {
        method: 'PATCH',
        headers: {
          apikey: key,
          Authorization: 'Bearer ' + key,
          'Content-Type': 'application/json',
          'Prefer': prefer
        },
        body: JSON.stringify(body)
      });
      if (!r.ok) {
        const e = await r.json().catch(() => ({}));
        throw new Error(e.message || e.error || `HTTP ${r.status}`);
      }
      return r.json();
    }

    // ── Storage Upload ─────────────────────────────────────
    const METER_BUCKET = 'attendance-meter-images';
    function extFromFile(file) {
      const n = file.name || '';
      const m = n.match(/\.([a-zA-Z0-9]+)$/);
      return (m && m[1]) ? m[1] : 'jpg';
    }

    async function uploadMeterImage(file) {
      const { url, key } = getCfg();
      if (!url || !key) throw new Error('Supabase未設定');
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2,'0');
      const rand = Math.random().toString(36).slice(2,8);
      const ts = Date.now();
      const path = `meter/${yyyy}/${mm}/${ts}-${rand}.${extFromFile(file)}`;

      const uploadRes = await fetch(`${url}/storage/v1/object/${METER_BUCKET}/${path}`, {
        method: 'POST',
        headers: {
          apikey: key,
          Authorization: 'Bearer ' + key,
          'Content-Type': file.type,
          'x-upsert': 'true'
        },
        body: file
      });
      if (!uploadRes.ok) {
        const e = await uploadRes.json().catch(() => ({}));
        throw new Error(e.message || e.error || `Storage ${uploadRes.status}`);
      }

      const publicUrl = `${url}/storage/v1/object/public/${METER_BUCKET}/${path}`;
      return { publicUrl, path };
    }

    // ── Form State ─────────────────────────────────────────
    const LS = {
      name: 'att_entry_name',
      company: 'att_entry_company',
      site: 'att_entry_site',
      hours: 'att_entry_hours',
      status: 'att_entry_status'
    };

    const HOURS = [8,7,6,5,4,3,2,1,0];
    function setHours(v) {
      const num = Number(v);
      $('workHoursVal').value = String(num);
      document.querySelectorAll('.hour-btn').forEach(b => {
        const bv = Number(b.dataset.v);
        b.classList.toggle('sel', bv === num);
      });
    }

    function buildHoursUI() {
      const grid = $('hoursGrid');
      grid.innerHTML = '';
      HOURS.forEach(h => {
        const b = document.createElement('div');
        b.className = 'hour-btn';
        b.dataset.v = String(h);
        b.textContent = `${h}H`;
        b.addEventListener('click', () => {
          setHours(h);
          localStorage.setItem(LS.hours, String(h));
        });
        grid.appendChild(b);
      });
    }

    function formatDateJP(ymd) {
      if (!ymd) return '';
      const d = new Date(ymd + 'T00:00:00');
      return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
    }

    function statusToLabel(status) {
      if (status === 'present') return '出勤';
      if (status === 'vacation') return '休暇';
      if (status === 'late') return '遅刻';
      if (status === 'early_leave') return '早退';
      if (status === 'absent') return '欠勤';
      if (status === 'direct_in') return '直行';
      if (status === 'direct_out') return '直帰';
      return status || '—';
    }

    let meterFile = null;
    $('meterImageFile').addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      meterFile = file || null;
      if (!meterFile) {
        $('photoPreview').classList.remove('show');
        $('photoPreviewImg').src = '';
        return;
      }
      const url = URL.createObjectURL(meterFile);
      $('photoPreviewImg').src = url;
      $('photoPreview').classList.add('show');
    });
    $('removePhotoBtn').addEventListener('click', () => {
      meterFile = null;
      $('meterImageFile').value = '';
      $('photoPreview').classList.remove('show');
      $('photoPreviewImg').src = '';
    });

    // ── Candidate Lists (datalist) ─────────────────────────
    async function loadCandidates() {
      const { url, key } = getCfg();
      const isDemo = !url || !key;

      if (isDemo) {
        // DEMOから最低限の候補を生成
        const entries = getDemoEntries();
        const names = Array.from(new Set(entries.map(e => e.worker_name).filter(Boolean))).slice(0, 20);
        const companies = Array.from(new Set(entries.map(e => e.company).filter(Boolean))).slice(0, 20);
        const sites = Array.from(new Set(entries.map(e => e.site_name).filter(Boolean))).slice(0, 30);
        names.forEach(n => addDatalistOption('nameList', n));
        companies.forEach(c => addDatalistOption('companyList', c));
        sites.forEach(s => addDatalistOption('siteList', s));
        return;
      }

      // workers（名前候補）
      try {
        const workers = await sbFetch(`workers?is_active=eq.true&select=name&order=name&limit=200`);
        workers.forEach(w => addDatalistOption('nameList', w.name));
      } catch {}

      // sites（現場候補）
      try {
        const sites = await sbFetch(`sites?select=name&order=name&limit=300`);
        sites.forEach(s => addDatalistOption('siteList', s.name));
      } catch {}
    }

    function addDatalistOption(listId, value) {
      if (!value) return;
      const list = $(listId);
      if (Array.from(list.options).some(o => o.value === value)) return;
      const opt = document.createElement('option');
      opt.value = value;
      list.appendChild(opt);
    }

    // ── Worker / Site Upsert ───────────────────────────────
    async function findOrCreateWorker(name, company) {
      const { url, key } = getCfg();
      if (!url || !key) throw new Error('Supabase未設定');

      const existing = await sbFetch(`workers?name=eq.${encodeURIComponent(name)}&company=eq.${encodeURIComponent(company)}&select=id,daily_rate,work_rates&limit=1`);
      if (existing && existing.length) return existing[0];

      const rate = 15000;
      const created = await sbPost('workers', { name, company, daily_rate: rate, work_rates: {}, is_active: true });
      // created is array
      return created && created[0] ? created[0] : null;
    }

    async function addSiteIfNew(siteName, company) {
      const existing = await sbFetch(`sites?name=eq.${encodeURIComponent(siteName)}&select=id&limit=1`);
      if (existing && existing.length) return;
      await sbPost('sites', { name: siteName, company });
    }

    function computeDailyRate(worker, workContent) {
      if (!worker) return 0;
      const base = Number(worker.daily_rate || 0);
      const rates = worker.work_rates || {};
      let applied = base;
      for (const [k, v] of Object.entries(rates)) {
        if (k && workContent && workContent.includes(k)) {
          applied = Number(v);
          break;
        }
      }
      return applied || base || 0;
    }

    // ── Submit ──────────────────────────────────────────────
    function getNotesByStatus(status, notes) {
      // 既存attendance_logsは備考を absent_note / late_reason に格納して運用しているため、
      // statusに応じて適切なカラムに載せ替えます。
      if (!notes) return { absent_note: null, late_reason: null };
      if (status === 'late') return { absent_note: null, late_reason: notes };
      return { absent_note: notes, late_reason: null };
    }

    async function submit() {
      const btn = $('submitBtn');
      btn.disabled = true;
      const { url, key } = getCfg();
      const isDemo = !url || !key;

      const workDate = $('workDate').value;
      const status = $('attStatus').value;
      const workHours = Number($('workHoursVal').value);
      const workerName = $('employeeName').value.trim();
      const company = $('primeContractor').value.trim();
      const siteName = $('siteName').value.trim();
      const workContent = $('workDetail').value.trim();
      const notes = $('notes').value.trim() || null;

      if (!workDate) return finishErr('日付を入力してください');
      if (!status) return finishErr('ステータスを選択してください');
      if (!workerName) return finishErr('名前を入力してください');
      if (!company) return finishErr('元請け会社名を入力してください');
      if (!siteName) return finishErr('現場名を入力してください');
      if (!workContent) return finishErr('作業内容を入力してください');
      if (Number.isNaN(workHours)) return finishErr('作業時間を入力してください');

      function finishErr(msg) {
        btn.disabled = false;
        btn.textContent = '📤 送信する';
        toast('⚠️ ' + msg, 'err');
        return false;
      }

      try {
        btn.textContent = '送信中...';

        // 入力の保存（連続入力のため）
        localStorage.setItem(LS.name, workerName);
        localStorage.setItem(LS.company, company);
        localStorage.setItem(LS.site, siteName);
        localStorage.setItem(LS.hours, String(workHours));
        localStorage.setItem(LS.status, status);

        // メーター画像アップロード（ライブ時のみ）
        let meterPhotoUrl = null;
        if (meterFile && !isDemo) {
          const upload = await uploadMeterImage(meterFile);
          meterPhotoUrl = upload.publicUrl;
        }

        if (isDemo) {
          const entry = {
            id: 'demo_' + Date.now(),
            work_date: workDate,
            worker_name: workerName,
            status,
            work_hours: workHours,
            company,
            site_name: siteName,
            work_content: workContent,
            meter_photo_url: meterPhotoUrl,
            late_time: null,
            late_reason: status === 'late' ? notes : null,
            absent_reason: (status === 'vacation' ? '休暇' : (status === 'absent' ? '欠勤' : null)),
            absent_note: (status === 'late' ? null : notes),
            submitted_at: new Date().toISOString(),
            notes
          };
          const arr = getDemoEntries();
          arr.push(entry);
          localStorage.setItem(DEMO_STORAGE_KEY, JSON.stringify(arr));
          toast('送信しました ✓', 'ok');
          showSuccess(entry);
          return;
        }

        // ── Live Mode ──
        const worker = await findOrCreateWorker(workerName, company);
        await addSiteIfNew(siteName, company);

        const appliedDailyRate = (status === 'vacation' || status === 'absent') ? 0 : computeDailyRate(worker, workContent);

        const noteByStatus = getNotesByStatus(status, notes);

        const payload = {
          work_date: workDate,
          worker_id: worker ? worker.id : null,
          worker_name: workerName,
          company,
          site_name: siteName,
          work_content: workContent,
          work_hours: workHours,
          daily_rate: appliedDailyRate,
          status,
          absent_reason:
            status === 'vacation' ? '休暇' :
            status === 'absent' ? '欠勤' : null,
          absent_note: noteByStatus.absent_note,
          late_time: status === 'late' ? '09:00' : null,
          late_reason: noteByStatus.late_reason,
          meter_photo_url: meterPhotoUrl
        };

        const created = await sbPost('attendance_logs', payload, 'return=representation');
        const row = (created && created[0]) ? created[0] : payload;
        toast('送信しました ✓', 'ok');
        showSuccess(row);
      } catch(e) {
        toast('送信に失敗しました: ' + (e && e.message ? e.message : e), 'err', 4500);
      } finally {
        btn.disabled = false;
        btn.textContent = '📤 送信する';
      }
    }

    function showSuccess(row) {
      $('mainCard').style.display = 'none';
      $('successScreen').classList.add('show');

      const st = row.status;
      const hoursVal = (row.work_hours === 0 || row.work_hours) ? `${row.work_hours}H` : '-';
      const notesVal = row.notes || row.absent_note || row.late_reason || '';

      $('successTitle').textContent = '送信しました';
      const el = $('successDetail');
      el.innerHTML = [
        ['日付', row.work_date],
        ['名前', row.worker_name],
        ['ステータス', statusToLabel(st)],
        ['作業時間', hoursVal],
        ['元請け会社', row.company],
        ['現場名', row.site_name],
        ['作業内容', row.work_content],
        [ '備考', notesVal ? notesVal : '-' ]
      ].map(([k,v]) => `<div class="row"><span class="k">${escText(k)}</span><span class="v">${escText(v)}</span></div>`).join('');
    }

    function escText(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function resetForm() {
      $('mainCard').style.display = 'block';
      $('successScreen').classList.remove('show');

      $('workDate').value = today;
      $('attStatus').value = localStorage.getItem(LS.status) || 'present';
      $('workDetail').value = '';
      $('notes').value = '';
      $('meterImageFile').value = '';
      meterFile = null;
      $('photoPreview').classList.remove('show');
      $('photoPreviewImg').src = '';

      const hours = Number(localStorage.getItem(LS.hours) || '8');
      setHours(hours);

      $('employeeName').value = localStorage.getItem(LS.name) || '';
      $('primeContractor').value = localStorage.getItem(LS.company) || '';
      $('siteName').value = localStorage.getItem(LS.site) || '';
    }

    $('submitBtn').addEventListener('click', submit);
    $('resetBtn').addEventListener('click', resetForm);

    // status change: statusが休暇/欠勤のとき hours は 0 を推奨（入力はユーザーが変更可能）
    $('attStatus').addEventListener('change', () => {
      const s = $('attStatus').value;
      if (s === 'vacation' || s === 'absent') {
        setHours(0);
      }
    });

    // ── Init ────────────────────────────────────────────────
    window.addEventListener('load', async () => {
      $('workDate').value = today;

      // hours init
      buildHoursUI();
      const initHours = Number(localStorage.getItem(LS.hours) || '8');
      setHours(initHours);

      // status init
      const initStatus = localStorage.getItem(LS.status) || 'present';
      $('attStatus').value = initStatus;
      if (initStatus === 'vacation' || initStatus === 'absent') setHours(0);

      $('employeeName').value = localStorage.getItem(LS.name) || '';
      $('primeContractor').value = localStorage.getItem(LS.company) || '';
      $('siteName').value = localStorage.getItem(LS.site) || '';

      const { url, key } = getCfg();
      const isDemo = !url || !key;
      if (isDemo) {
        $('demoBanner').classList.add('show');
        $('modeBadge').style.display = 'inline-flex';
        ensureDemoSeed();
      } else {
        try {
          $('demoBanner').classList.remove('show');
        } catch {}
      }

      // datalist candidates（失敗しても入力は継続）
      await loadCandidates();
    });
  </script>
</body>
</html>

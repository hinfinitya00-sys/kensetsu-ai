<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン｜建設AIシステム</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <script>
    // すでにログイン済みならリダイレクト
    (function () {
      const raw = localStorage.getItem('sb-bjohdzcoziezdkqcebhe-auth-token');
      if (!raw) return;
      try {
        const d = JSON.parse(raw);
        const token = d.access_token || (d.session && d.session.access_token);
        if (!token) return;
        const exp = d.expires_at || (d.session && d.session.expires_at);
        if (exp && exp * 1000 <= Date.now()) return;
        const params = new URLSearchParams(location.search);
        const ret = params.get('return') || 'admin.html';
        location.replace(decodeURIComponent(ret));
      } catch {}
    })();
  </script>
  <style>
    :root {
      --navy:         #0B1426;
      --navy2:        #111D35;
      --navy3:        #172140;
      --card:         #1A2747;
      --card2:        #1F2E52;
      --border:       #2A3D6B;
      --text:         #E8EDF8;
      --muted:        #7A8CAE;
      --orange:       #FF6B00;
      --orange-dark:  #CC5500;
      --green:        #22C55E;
      --red:          #EF4444;
      --blue:         #3B82F6;
      --yellow:       #F59E0B;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }
    body {
      background: var(--navy);
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(59,130,246,.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(255,107,0,.06) 0%, transparent 50%);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── ロゴ ───────────────────────────────────── */
    .logo-wrap { text-align: center; margin-bottom: 36px; animation: fadeUp .45s ease both; }
    .logo-mark {
      width: 56px; height: 56px;
      background: var(--orange);
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 900; color: #fff;
      margin: 0 auto 14px;
    }
    .logo-text { font-family: 'Oswald', sans-serif; font-size: 30px; font-weight: 700; letter-spacing: 2px; color: var(--text); }
    .logo-text span { color: var(--orange); }
    .logo-sub { font-size: 13px; color: var(--muted); margin-top: 6px; letter-spacing: .5px; }

    /* ── カード ─────────────────────────────────── */
    .login-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 36px 32px;
      width: 100%; max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      animation: fadeUp .45s .1s ease both;
    }

    /* ── タブ ───────────────────────────────────── */
    .tabs { display: flex; background: var(--navy2); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
    .tab-btn {
      flex: 1; padding: 10px; border: none; border-radius: 9px;
      background: transparent; color: var(--muted);
      font-size: 14px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer; transition: all .2s;
    }
    .tab-btn.active { background: var(--orange); color: #fff; box-shadow: 0 2px 12px rgba(255,107,0,.35); }

    /* ── フォーム ────────────────────────────────── */
    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .fg { margin-bottom: 18px; }
    .fg label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 7px; text-transform: uppercase; letter-spacing: .7px; }
    .input-wrap { position: relative; }
    .fg input[type=email],
    .fg input[type=password],
    .fg input[type=text] {
      width: 100%; background: var(--card2); border: 2px solid var(--border);
      color: var(--text); padding: 13px 46px 13px 16px;
      border-radius: 12px; font-size: 15px; font-family: 'Noto Sans JP', sans-serif;
      transition: border-color .2s, box-shadow .2s;
    }
    .fg input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
    .fg input.error-input { border-color: var(--red); }
    .toggle-pw {
      position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); font-size: 17px;
      cursor: pointer; padding: 4px; transition: color .15s;
    }
    .toggle-pw:hover { color: var(--text); }

    /* ── メッセージ ──────────────────────────────── */
    .msg { display: none; font-size: 13px; font-weight: 700; margin-bottom: 18px; padding: 10px 14px; border-radius: 8px; text-align: center; }
    .msg.show { display: block; }
    .msg.error   { color: var(--red);    background: rgba(239,68,68,.08);   border: 1px solid rgba(239,68,68,.25); }
    .msg.success { color: var(--green);  background: rgba(34,197,94,.08);   border: 1px solid rgba(34,197,94,.25); }
    .msg.info    { color: var(--yellow); background: rgba(245,158,11,.08);  border: 1px solid rgba(245,158,11,.25); }

    /* ── ボタン ─────────────────────────────────── */
    .btn-primary {
      width: 100%; background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: #fff; border: none; padding: 15px; border-radius: 12px;
      font-size: 15px; font-weight: 900; letter-spacing: .5px;
      font-family: 'Noto Sans JP', sans-serif;
      box-shadow: 0 4px 20px rgba(255,107,0,.35);
      transition: all .2s; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 6px;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,107,0,.45); }
    .btn-primary:active:not(:disabled) { transform: scale(.98); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }

    /* ── フッター / セッション切れ通知 ─────────────── */
    .notice {
      display: none; background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.3);
      color: var(--yellow); border-radius: 10px; padding: 10px 16px;
      font-size: 13px; text-align: center; margin-bottom: 20px;
    }
    .notice.show { display: block; }
    .footer-note { margin-top: 28px; text-align: center; font-size: 11px; color: var(--muted); opacity: .5; animation: fadeUp .45s .3s ease both; }

    /* ── パスワード強度バー ───────────────────────── */
    .pw-strength { height: 3px; border-radius: 2px; margin-top: 6px; transition: width .3s, background .3s; width: 0; }

    /* ── アニメーション ──────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
  </style>
</head>
<body>

<!-- ロゴ -->
<div class="logo-wrap">
  <div class="logo-mark">建</div>
  <div class="logo-text">KENSETSU<span>AI</span></div>
  <div class="logo-sub">建設業向け DX管理システム</div>
</div>

<!-- ログインカード -->
<div class="login-card">

  <div class="notice" id="notice">⏰ セッションが切れました。再度ログインしてください。</div>

  <!-- タブ -->
  <div class="tabs">
    <button class="tab-btn active" id="tabLogin"    onclick="switchTab('login')">🔑 ログイン</button>
    <button class="tab-btn"        id="tabRegister" onclick="switchTab('register')">✨ 新規登録</button>
  </div>

  <!-- ── ログインフォーム ── -->
  <div class="form-panel active" id="panelLogin">
    <div class="msg error"   id="loginErr"></div>
    <div class="msg success" id="loginOk"></div>

    <div class="fg">
      <label>メールアドレス</label>
      <div class="input-wrap">
        <input type="email" id="loginEmail" placeholder="example@company.com"
               autocomplete="email" autofocus
               onkeydown="if(event.key==='Enter')doLogin()">
      </div>
    </div>

    <div class="fg">
      <label>パスワード</label>
      <div class="input-wrap">
        <input type="password" id="loginPw" placeholder="••••••••••••"
               autocomplete="current-password"
               onkeydown="if(event.key==='Enter')doLogin()">
        <button class="toggle-pw" onclick="togglePw('loginPw',this)" type="button">👁</button>
      </div>
    </div>

    <button class="btn-primary" id="btnLogin" onclick="doLogin()">🔑 ログイン</button>
  </div>

  <!-- ── 新規登録フォーム ── -->
  <div class="form-panel" id="panelRegister">
    <div class="msg error"   id="regErr"></div>
    <div class="msg success" id="regOk"></div>
    <div class="msg info"    id="regInfo"></div>

    <div class="fg">
      <label>会社名</label>
      <div class="input-wrap">
        <input type="text" id="regCompany" placeholder="株式会社◯◯建設"
               autocomplete="organization"
               onkeydown="if(event.key==='Enter')document.getElementById('regEmail').focus()">
      </div>
    </div>

    <div class="fg">
      <label>メールアドレス</label>
      <div class="input-wrap">
        <input type="email" id="regEmail" placeholder="example@company.com"
               autocomplete="email"
               onkeydown="if(event.key==='Enter')document.getElementById('regPw').focus()">
      </div>
    </div>

    <div class="fg">
      <label>パスワード（8文字以上）</label>
      <div class="input-wrap">
        <input type="password" id="regPw" placeholder="••••••••••••"
               autocomplete="new-password"
               oninput="checkPwStrength(this.value)"
               onkeydown="if(event.key==='Enter')document.getElementById('regPwConfirm').focus()">
        <button class="toggle-pw" onclick="togglePw('regPw',this)" type="button">👁</button>
      </div>
      <div class="pw-strength" id="pwStrength"></div>
    </div>

    <div class="fg">
      <label>パスワード（確認）</label>
      <div class="input-wrap">
        <input type="password" id="regPwConfirm" placeholder="••••••••••••"
               autocomplete="new-password"
               onkeydown="if(event.key==='Enter')doRegister()">
        <button class="toggle-pw" onclick="togglePw('regPwConfirm',this)" type="button">👁</button>
      </div>
    </div>

    <button class="btn-primary" id="btnRegister" onclick="doRegister()">✨ アカウントを作成</button>
  </div>

</div><!-- /.login-card -->

<div class="footer-note">© 建設AIシステム — 管理者専用ページ</div>

<script>
(function () {
  'use strict';

  const SB_URL      = 'https://bjohdzcoziezdkqcebhe.supabase.co';
  const SB_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqb2hkemNvemllemRrcWNlYmhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTI5NTAsImV4cCI6MjA4ODg4ODk1MH0.SUZ35eULi_RQzNPDQG2n5cBJCdTDXJZ1pB307ZNbSPU';
  const COMPANY_KEY = 'ks_company';

  /* ── Supabase クライアント ─────────────────────── */
  function sbClient() {
    return supabase.createClient(SB_URL, SB_ANON_KEY);
  }

  /* ── localStorage に URL/KEY を同期（admin ページが参照するため） */
  localStorage.setItem('dr_sb_url', SB_URL);
  localStorage.setItem('dr_sb_key', SB_ANON_KEY);

  /* ── 初期化 ─────────────────────────────────────── */
  const params = new URLSearchParams(location.search);
  if (params.get('return')) {
    document.getElementById('notice').classList.add('show');
  }

  /* ── タブ切り替え ────────────────────────────────── */
  window.switchTab = function (tab) {
    const tabs   = { login: 'Login',    register: 'Register' };
    const others = { login: 'register', register: 'login'    };
    document.getElementById('panel' + tabs[tab]).classList.add('active');
    document.getElementById('tab'   + tabs[tab]).classList.add('active');
    document.getElementById('panel' + tabs[others[tab]]).classList.remove('active');
    document.getElementById('tab'   + tabs[others[tab]]).classList.remove('active');
    clearMsgs();
  };

  /* ── メッセージ操作 ──────────────────────────────── */
  function showMsg(id, text) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.classList.add('show');
  }
  function clearMsgs() {
    ['loginErr','loginOk','regErr','regOk','regInfo'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('show');
      el.textContent = '';
    });
  }
  function shakeInput(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add('error-input');
    el.style.animation = 'shake .3s ease';
    setTimeout(() => { el.style.animation = ''; el.classList.remove('error-input'); }, 400);
  }

  /* ── パスワード表示切替 ──────────────────────────── */
  window.togglePw = function (inputId, btn) {
    const inp = document.getElementById(inputId);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
  };

  /* ── パスワード強度バー ──────────────────────────── */
  window.checkPwStrength = function (pw) {
    const bar = document.getElementById('pwStrength');
    let s = 0;
    if (pw.length >= 8)  s++;
    if (pw.length >= 12) s++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
    if (/[0-9]/.test(pw)) s++;
    if (/[^A-Za-z0-9]/.test(pw)) s++;
    const w = ['0%','20%','40%','60%','80%','100%'][s];
    const c = ['transparent','#EF4444','#F59E0B','#F59E0B','#22C55E','#22C55E'][s];
    bar.style.width = w;
    bar.style.background = c;
  };

  /* ── ログイン ─────────────────────────────────────── */
  window.doLogin = async function () {
    clearMsgs();
    const email = document.getElementById('loginEmail').value.trim();
    const pw    = document.getElementById('loginPw').value;
    const btn   = document.getElementById('btnLogin');

    if (!email) { showMsg('loginErr', '❌ メールアドレスを入力してください'); shakeInput('loginEmail'); return; }
    if (!pw)    { showMsg('loginErr', '❌ パスワードを入力してください');       shakeInput('loginPw');    return; }

    const sb = sbClient();
    btn.disabled = true;
    btn.innerHTML = '⏳ ログイン中...';

    const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });

    btn.disabled = false;
    btn.innerHTML = '🔑 ログイン';

    if (error) {
      let msg = '❌ ' + error.message;
      if (error.message.includes('Invalid login credentials')) msg = '❌ メールアドレスまたはパスワードが違います';
      if (error.message.includes('Email not confirmed'))       msg = '❌ メールアドレスの確認が完了していません。受信ボックスをご確認ください';
      showMsg('loginErr', msg);
      shakeInput('loginPw');
      document.getElementById('loginPw').value = '';
      return;
    }

    showMsg('loginOk', '✅ ログイン成功！移動中...');
    const ret = params.get('return') || 'admin.html';
    setTimeout(() => location.replace(decodeURIComponent(ret)), 600);
  };

  /* ── 新規登録 ─────────────────────────────────────── */
  window.doRegister = async function () {
    clearMsgs();
    const company = document.getElementById('regCompany').value.trim();
    const email   = document.getElementById('regEmail').value.trim();
    const pw      = document.getElementById('regPw').value;
    const pwc     = document.getElementById('regPwConfirm').value;
    const btn     = document.getElementById('btnRegister');

    if (!company)      { showMsg('regErr', '❌ 会社名を入力してください');             shakeInput('regCompany');   return; }
    if (!email)        { showMsg('regErr', '❌ メールアドレスを入力してください');       shakeInput('regEmail');     return; }
    if (!pw)           { showMsg('regErr', '❌ パスワードを入力してください');           shakeInput('regPw');        return; }
    if (pw.length < 8) { showMsg('regErr', '❌ パスワードは8文字以上にしてください');    shakeInput('regPw');        return; }
    if (pw !== pwc)    { showMsg('regErr', '❌ パスワードが一致しません');               shakeInput('regPwConfirm'); return; }

    const sb = sbClient();
    btn.disabled = true;
    btn.innerHTML = '⏳ 登録中...';

    // ① Supabase Auth にユーザー作成
    const { data: signUpData, error: signUpErr } = await sb.auth.signUp({ email, password: pw });

    btn.disabled = false;
    btn.innerHTML = '✨ アカウントを作成';

    if (signUpErr) {
      let msg = '❌ ' + signUpErr.message;
      if (signUpErr.message.includes('already registered')) msg = '❌ このメールアドレスはすでに登録されています';
      showMsg('regErr', msg);
      shakeInput('regEmail');
      return;
    }

    const session = signUpData.session;
    const userId  = signUpData.user && signUpData.user.id;

    if (session && userId) {
      // メール確認不要 → 即座に会社作成してログイン
      await _createCompany(sb, userId, company);
      showMsg('regOk', '✅ 登録完了！管理画面へ移動します...');
      setTimeout(() => location.replace('admin.html'), 1200);
    } else {
      // メール確認が必要なケース
      localStorage.setItem('ks_pending_company', company);
      showMsg('regInfo', '📧 確認メールを送信しました。メール内のリンクをクリック後、ログインしてください。');
      switchTab('login');
      document.getElementById('loginEmail').value = email;
    }
  };

  /* ── companies + user_companies 作成 ─────────────── */
  async function _createCompany(sb, userId, companyName) {
    try {
      const { data: co, error: coErr } = await sb
        .from('companies')
        .insert({ name: companyName })
        .select('id, name')
        .single();
      if (coErr) { console.error('[login] companies insert:', coErr); return; }

      const { error: ucErr } = await sb
        .from('user_companies')
        .insert({ user_id: userId, company_id: co.id });
      if (ucErr) { console.error('[login] user_companies insert:', ucErr); return; }

      localStorage.setItem(COMPANY_KEY, JSON.stringify({ id: co.id, name: co.name }));
      localStorage.removeItem('ks_pending_company');
    } catch (e) {
      console.error('[login] _createCompany:', e);
    }
  }

  /* ── メール確認後のログイン時に pending company を処理 ── */
  (async function () {
    const pending = localStorage.getItem('ks_pending_company');
    if (!pending) return;
    const sb = sbClient();
    if (!sb) return;
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;
    await _createCompany(sb, session.user.id, pending);
  })();

})();
</script>
</body>
</html>
